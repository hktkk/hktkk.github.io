<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>華夏之光・青花瓷修復大師</title>
    <!-- 載入 Tailwind CSS 繪圖引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React 框架 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 轉換器 (用於在瀏覽器直接解析 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f5f5f4;
            overscroll-behavior: none;
        }

        .font-serif {
            font-family: 'Noto Serif TC', serif;
        }

        @keyframes fall {
          0% { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
          100% { transform: translateY(100vh) rotate(360deg) scale(0.5); opacity: 0; }
        }

        .animate-fall {
            animation: fall linear infinite;
        }

        .no-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 題庫資料 ---
        const ALL_PIECES_DATA = [
          { word: '蘋果', image: '🍎' },
          { word: '小鳥', image: '🐦' },
          { word: '小魚', image: '🐟' },
          { word: '太陽', image: '☀️' },
          { word: '月亮', image: '🌙' },
          { word: '大樹', image: '🌲' },
          { word: '小貓', image: '🐱' },
          { word: '小狗', image: '🐶' },
          { word: '花朵', image: '🌸' },
          { word: '汽車', image: '🚗' },
          { word: '飛機', image: '✈️' },
          { word: '星星', image: '⭐' }
        ];

        // --- 全局音訊管理員 (解決 iPad 啟動延遲與失效問題) ---
        let globalAudioCtx = null;

        const getAudioCtx = () => {
          if (!globalAudioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) {
              globalAudioCtx = new AudioContext();
            }
          }
          return globalAudioCtx;
        };

        const unlockAudio = async () => {
          const ctx = getAudioCtx();
          if (ctx && ctx.state === 'suspended') {
            await ctx.resume();
          }
          if (ctx) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          }
        };

        const playDropSound = () => {
          const ctx = getAudioCtx();
          if (!ctx) return;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); 
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        };

        const playSuccessSound = () => {
          const ctx = getAudioCtx();
          if (!ctx) return;
          const playTone = (freq, startTime, duration) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.3, startTime + 0.05); 
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration); 
            osc.start(startTime);
            osc.stop(startTime + duration);
          };
          const now = ctx.currentTime;
          playTone(523.25, now, 0.4); 
          playTone(659.25, now + 0.1, 0.4); 
          playTone(783.99, now + 0.2, 0.4); 
          playTone(1046.50, now + 0.3, 0.8); 
        };

        // --- 隨機抽取題目 ---
        const getRandomPieces = () => {
          const shuffled = [...ALL_PIECES_DATA].sort(() => 0.5 - Math.random());
          return shuffled.slice(0, 3).map((item, index) => ({
            id: index,
            word: item.word,
            image: item.image,
            targetId: `target-${index}`,
            isPlaced: false
          }));
        };

        // --- 子組件 ---
        const Confetti = () => {
          const colors = ['bg-red-500', 'bg-yellow-400', 'bg-blue-500', 'bg-green-500', 'bg-pink-500'];
          return (
            <div className="absolute inset-0 overflow-hidden pointer-events-none z-50">
              {[...Array(60)].map((_, i) => (
                <div
                  key={i}
                  className={`absolute w-3 h-3 md:w-5 md:h-5 ${colors[i % colors.length]} rounded-full opacity-90 shadow-sm animate-fall`}
                  style={{
                    left: `${Math.random() * 100}%`,
                    top: `-5%`,
                    animationDuration: `${Math.random() * 3 + 2}s`,
                    animationDelay: `${Math.random() * 2}s`
                  }}
                />
              ))}
            </div>
          );
        };

        const CutePanda = ({ isVisible }) => (
          <div className={`absolute bottom-[10vh] right-4 md:right-10 transition-transform duration-700 ease-out z-[45] ${isVisible ? 'translate-y-0' : 'translate-y-[200%]'}`}>
            <svg width="150" height="170" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg" className="w-[120px] md:w-[180px] h-auto drop-shadow-xl">
              <circle cx="40" cy="50" r="25" fill="#1f2937" />
              <circle cx="160" cy="50" r="25" fill="#1f2937" />
              <circle cx="100" cy="100" r="70" fill="white" stroke="#1f2937" strokeWidth="6" />
              <ellipse cx="70" cy="95" rx="20" ry="25" fill="#1f2937" transform="rotate(-15 70 95)" />
              <ellipse cx="130" cy="95" rx="20" ry="25" fill="#1f2937" transform="rotate(15 130 95)" />
              <circle cx="75" cy="90" r="6" fill="white" />
              <circle cx="125" cy="90" r="6" fill="white" />
              <ellipse cx="100" cy="120" rx="10" ry="6" fill="#1f2937" />
              <path d="M 90 135 Q 100 145 110 135" fill="none" stroke="#1f2937" strokeWidth="4" strokeLinecap="round" />
              <rect x="20" y="150" width="160" height="60" rx="15" fill="#fbbf24" stroke="#b45309" strokeWidth="6" />
              <text x="100" y="190" fontSize="28" fontWeight="bold" textAnchor="middle" fill="#b45309">大成功！</text>
              <circle cx="30" cy="165" r="15" fill="#1f2937" />
              <circle cx="170" cy="165" r="15" fill="#1f2937" />
            </svg>
          </div>
        );

        const TargetHole = ({ image, placed, word }) => (
          <div className={`w-full h-full flex items-center justify-center rounded-full transition-all duration-300 ${placed ? 'bg-white shadow-[inset_0_3px_10px_rgba(0,0,0,0.1),0_5px_15px_rgba(0,0,0,0.15)] border-[4px] md:border-[6px] border-white' : 'bg-white/80 border-[4px] md:border-[6px] border-dashed border-blue-400 backdrop-blur-sm'}`}>
            {placed ? (
              <span className="font-bold text-blue-900 text-center leading-tight" style={{ fontSize: 'clamp(1rem, 3.5vh, 2.5rem)' }}>{word}</span>
            ) : (
              <span className="opacity-90" style={{ fontSize: 'clamp(1.8rem, 6vh, 4.5rem)' }}>{image}</span>
            )}
          </div>
        );

        const WordPiece = ({ word, isDragging }) => (
          <div className={`px-6 py-4 md:px-10 md:py-6 bg-white border-[4px] md:border-[6px] border-blue-800 rounded-full flex items-center justify-center cursor-grab active:cursor-grabbing transition-all duration-200 ${isDragging ? 'shadow-none' : 'shadow-[0_8px_20px_rgba(0,0,0,0.12)]'}`}>
            <span className="font-bold text-blue-900" style={{ fontSize: 'clamp(1.2rem, 3vh, 2.2rem)' }}>{word}</span>
          </div>
        );

        // --- 主 App ---
        function App() {
          const [gameStarted, setGameStarted] = useState(false);
          const [pieces, setPieces] = useState(getRandomPieces());
          const [draggingId, setDraggingId] = useState(null);
          const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
          const [isWin, setIsWin] = useState(false);
          
          useEffect(() => {
            if (pieces.length > 0 && pieces.every(p => p.isPlaced)) {
              setTimeout(() => {
                setIsWin(true);
                playSuccessSound();
              }, 300);
            }
          }, [pieces]);

          const handlePointerDown = (e, id) => {
            if (isWin) return;
            e.preventDefault(); 
            e.currentTarget.setPointerCapture(e.pointerId); 
            setDraggingId(id);
            setDragPos({ x: e.clientX, y: e.clientY });
          };

          const handlePointerMove = (e) => {
            if (draggingId !== null) {
              setDragPos({ x: e.clientX, y: e.clientY });
            }
          };

          const handlePointerUp = (e, id) => {
            if (draggingId === null) return;
            const targetEl = document.getElementById(`target-${id}`);
            if (targetEl) {
              const rect = targetEl.getBoundingClientRect();
              const targetCenterX = rect.left + rect.width / 2;
              const targetCenterY = rect.top + rect.height / 2;
              const distance = Math.hypot(e.clientX - targetCenterX, e.clientY - targetCenterY);
              const snapThreshold = rect.width * 1.1;
              if (distance < snapThreshold) {
                setPieces(prev => prev.map(p => p.id === id ? { ...p, isPlaced: true } : p));
                playDropSound(); 
              }
            }
            setDraggingId(null);
            if (e.currentTarget.hasPointerCapture(e.pointerId)) {
              e.currentTarget.releasePointerCapture(e.pointerId);
            }
          };

          const handleRestart = () => {
            setIsWin(false);
            setPieces(getRandomPieces());
          };

          if (!gameStarted) {
            return (
              <div className="w-full h-screen bg-stone-100 flex flex-col items-center justify-center p-6 touch-none">
                <h1 className="text-3xl md:text-6xl font-black text-blue-900 tracking-wider drop-shadow-sm mb-12 font-serif text-center leading-normal">
                  華夏之光<br/><span className="text-2xl md:text-4xl opacity-80">青花瓷修復大師</span>
                </h1>
                <button 
                  onClick={() => { unlockAudio(); setGameStarted(true); }}
                  className="px-12 py-6 md:px-16 md:py-8 bg-yellow-400 text-yellow-900 font-bold rounded-full border-[6px] border-yellow-500 hover:bg-yellow-300 shadow-[0_15px_30px_rgba(0,0,0,0.15)] active:scale-95 transition-all text-2xl md:text-4xl animate-bounce"
                >
                  開始遊戲
                </button>
              </div>
            );
          }

          return (
            <div className="w-full h-screen bg-stone-100 flex flex-col overflow-hidden touch-none" onPointerMove={handlePointerMove}>
              <div className="flex-none w-full text-center py-2 md:py-3 z-20 bg-white/40 backdrop-blur-md shadow-sm border-b border-stone-200">
                <h1 className="text-xl md:text-3xl font-black text-blue-900 tracking-wider font-serif">華夏之光・青花瓷修復大師</h1>
                <p className="text-blue-700 font-bold text-xs md:text-base px-4">把下面的詞語拖曳到青花瓷對應的圖案上吧！</p>
              </div>

              <div className="flex-1 relative flex items-center justify-center w-full z-10 px-2 md:px-8 py-4 min-h-0">
                <div 
                  className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vh] h-[90vh] pointer-events-none transition-opacity duration-1000 ${isWin ? 'opacity-80' : 'opacity-0'}`}
                  style={{ background: 'radial-gradient(circle, rgba(253,224,71,0.6) 0%, rgba(250,204,21,0) 65%)' }}
                ></div>
                
                <div className={`relative h-full max-w-full aspect-[26/42] transition-all duration-700 ${isWin ? 'drop-shadow-[0_0_35px_rgba(250,204,21,0.8)] scale-105' : 'drop-shadow-[0_20px_40px_rgba(0,0,0,0.2)]'}`}>
                  <svg viewBox="0 0 260 420" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                      <path id="vase-outline" d="M 90 25 C 90 40, 110 60, 110 100 C 110 160, 40 200, 40 260 C 40 330, 80 360, 90 360 L 170 360 C 180 360, 220 330, 220 260 C 220 200, 150 160, 150 100 C 150 60, 170 40, 170 25 Z" />
                      <clipPath id="vase-clip">
                        <use href="#vase-outline" />
                      </clipPath>
                      <g id="lotus">
                        <path d="M 0 0 C -15 -15, -25 0, 0 25 C 25 0, 15 -15, 0 0 Z" fill="#1e3a8a" />
                        <circle cx="0" cy="6" r="3" fill="#f8fafc" />
                      </g>
                    </defs>
                    <ellipse cx="130" cy="365" rx="48" ry="12" fill="#451a03" />
                    <path d="M 82 365 Q 130 380 178 365 L 170 380 Q 130 395 90 380 Z" fill="#290f02" />
                    <use href="#vase-outline" fill="#f8fafc" />
                    <g clipPath="url(#vase-clip)">
                      <rect x="0" y="25" width="260" height="15" fill="#1e3a8a" opacity="0.9" />
                      <path d="M 110 100 L 115 50 L 120 100 L 125 45 L 130 100 L 135 45 L 140 100 L 145 50 L 150 100" fill="none" stroke="#1e3a8a" strokeWidth="3" strokeLinejoin="round" />
                      <path d="M 0 130 Q 130 150 260 130" fill="none" stroke="#1e3a8a" strokeWidth="6" />
                      <path d="M 0 140 Q 130 160 260 140" fill="none" stroke="#1e3a8a" strokeWidth="2" />
                      <path d="M 70 145 Q 90 170 110 148 Q 130 175 150 148 Q 170 170 190 145" fill="none" stroke="#1e3a8a" strokeWidth="4" strokeLinecap="round" />
                      <path d="M 30 230 C 60 180, 100 280, 130 220 C 160 160, 200 260, 230 200" fill="none" stroke="#1e3a8a" strokeWidth="3" opacity="0.8" />
                      <path d="M 40 280 C 80 320, 120 220, 160 290 C 190 330, 220 260, 240 290" fill="none" stroke="#1e3a8a" strokeWidth="3" opacity="0.8" />
                      <use href="#lotus" x="80" y="210" transform="rotate(30 80 210)" />
                      <use href="#lotus" x="180" y="230" transform="rotate(-45 180 230)" />
                      <use href="#lotus" x="130" y="290" transform="rotate(15 130 290)" />
                      <path d="M 0 320 Q 130 300 260 320" fill="none" stroke="#1e3a8a" strokeWidth="4" />
                      <path d="M 70 320 L 80 370 M 90 315 L 100 370 M 110 312 L 120 370 M 130 310 L 130 370 M 150 312 L 140 370 M 170 315 L 160 370 M 190 320 L 180 370" stroke="#1e3a8a" strokeWidth="2" />
                      <rect x="0" y="350" width="260" height="15" fill="#1e3a8a" opacity="0.9" />
                    </g>
                    <use href="#vase-outline" fill="none" stroke="#1e3a8a" strokeWidth="6" strokeLinejoin="round" />
                    <ellipse cx="130" cy="25" rx="40" ry="8" fill="#e2e8f0" stroke="#1e3a8a" strokeWidth="5" />
                    <ellipse cx="130" cy="25" rx="25" ry="4" fill="#cbd5e1" stroke="#1e3a8a" strokeWidth="2" />
                  </svg>
                  <div id="target-0" className="absolute top-[33%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-[28%] aspect-square max-w-[120px]">
                    <TargetHole image={pieces[0].image} word={pieces[0].word} placed={pieces[0].isPlaced} />
                  </div>
                  <div id="target-1" className="absolute top-[60%] left-[28%] -translate-x-1/2 -translate-y-1/2 w-[28%] aspect-square max-w-[110px]">
                    <TargetHole image={pieces[1].image} word={pieces[1].word} placed={pieces[1].isPlaced} />
                  </div>
                  <div id="target-2" className="absolute top-[60%] left-[72%] -translate-x-1/2 -translate-y-1/2 w-[28%] aspect-square max-w-[110px]">
                    <TargetHole image={pieces[2].image} word={pieces[2].word} placed={pieces[2].isPlaced} />
                  </div>
                </div>
              </div>

              <div className={`flex-none w-full h-[16vh] min-h-[110px] bg-white/90 backdrop-blur-xl border-t-[6px] border-stone-300 rounded-t-[40px] flex justify-center items-center gap-6 md:gap-16 z-30 shadow-[0_-15px_30px_rgba(0,0,0,0.06)] transition-transform duration-500 pb-2 ${isWin ? 'translate-y-full' : 'translate-y-0'}`}>
                {pieces.map((p) => !p.isPlaced && (
                  <div key={p.id} onPointerDown={(e) => handlePointerDown(e, p.id)} onPointerUp={(e) => handlePointerUp(e, p.id)} onPointerCancel={(e) => handlePointerUp(e, p.id)} className={`cursor-grab touch-none ${draggingId === p.id ? 'opacity-0' : 'hover:-translate-y-2 active:scale-95 transition-transform duration-200'}`}>
                    <WordPiece word={p.word} isDragging={false} />
                  </div>
                ))}
              </div>

              {draggingId !== null && (
                <div className="fixed pointer-events-none z-[100]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) scale(1.2)', filter: 'drop-shadow(0 25px 25px rgba(0,0,0,0.3))' }}>
                  <WordPiece word={pieces.find(p => p.id === draggingId).word} isDragging={true} />
                </div>
              )}

              {isWin && <Confetti />}
              <CutePanda isVisible={isWin} />
              {isWin && (
                <button onClick={handleRestart} className="absolute top-4 right-4 md:top-6 md:right-8 px-6 py-4 bg-yellow-400 text-yellow-900 font-bold rounded-full border-[6px] border-yellow-500 hover:bg-yellow-300 shadow-2xl z-50 animate-bounce font-serif text-lg md:text-2xl">換新題目</button>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
