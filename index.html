<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacky | My Portfolio</title>
    <style>
        /* =========================================
           1. 全域變數與基礎設定 (調整風格看這裡)
        ========================================= */
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --secondary-text: #666666;
            --accent-color: #2b6cb0; /* 主題色，可改為你喜歡的顏色 */
            --border-color: #e2e8f0;
            --hover-bg: #f7fafc;
        }

        /* 深色模式支援 (依使用者系統自動切換) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a202c;
                --text-color: #f7fafc;
                --secondary-text: #a0aec0;
                --accent-color: #63b3ed;
                --border-color: #2d3748;
                --hover-bg: #2d3748;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--bg-color);
            max-width: 760px;
            margin: 0 auto;
            padding: 60px 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* =========================================
           2. 頁首區域 (Header)
        ========================================= */
        header {
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .bio {
            font-size: 1.1rem;
            color: var(--secondary-text);
        }

        /* =========================================
           3. 作品列表與卡片樣式
        ========================================= */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .project-item {
            padding: 20px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .project-item:hover {
            border-color: var(--border-color);
            background-color: var(--hover-bg);
        }

        /* 圖片容器 */
        .project-image {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: none; /* 預設隱藏，由 JS 控制顯示 */
        }

        .project-title {
            font-size: 1.4rem;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 5px;
        }

        .project-title:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .description {
            margin-top: 10px;
            color: var(--text-color);
        }

        /* =========================================
           4. 頁尾 (Footer)
        ========================================= */
        footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary-text);
        }
    </style>
</head>
<body>

    <!-- 頁首：請在這裡修改你的個人資訊 -->
    <header>
        <h1>Jacky</h1>
        <p class="bio">你好！這是我在學習網頁開發過程中所建立的作品集。<br>專注於簡潔、易讀且具有良好使用者體驗的設計。</p>
    </header>

    <!-- 這裡將由 JavaScript 自動填入作品 -->
    <main class="project-list" id="project-container"></main>

    <footer>
        <p>&copy; 2026 Jacky. 打造於 GitHub Pages.</p>
    </footer>

    <!-- =========================================
         5. 資料與邏輯區 (新增作品請修改這裡)
    ========================================= -->
    <script>
        // 🌟 新增作品只需在這裡加入新的物件即可！
        const projects = [
            {
                title: "QR Code 生成器",
                image: "", // 有圖片網址就填入，沒有的話保持空字串 ""
                description: "這是一個方便好用的 QR Code 生成工具。", // 請在這裡填入介紹
                demo: "https://hktkk.github.io/app/qrcode.html" // 點擊標題時會前往此網址
            }
            // 如果有第二個作品，就在這裡加上逗號並複製上面的格式
        ];

        // 將資料渲染到 HTML 上的邏輯
        const container = document.getElementById('project-container');
        
        projects.forEach(project => {
            // 判斷是否有圖片，若有則加上 src 屬性並顯示
            const imageHtml = project.image 
                ? `<img src="${project.image}" alt="${project.title} 截圖" class="project-image" style="display: block;">` 
                : '';

            // 組合單個作品的 HTML 結構 (只保留圖片、標題與描述)
            const html = `
                <article class="project-item">
                    ${imageHtml}
                    <a href="${project.demo}" target="_blank" class="project-title">${project.title}</a>
                    ${project.description ? `<p class="description">${project.description}</p>` : ''}
                </article>
            `;
            // 將組合好的 HTML 塞入容器中
            container.innerHTML += html;
        });
    </script>

</body>
</html>
