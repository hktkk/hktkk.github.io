<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>猜猜成語</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #fffbeb; /* 溫暖的淺黃色背景 */
            overscroll-behavior: none;
            overflow: hidden; 
        }
        .font-serif { font-family: 'Noto Serif TC', serif; }
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        
        /* 將動畫統一放在 head，徹底杜絕文字外洩問題 */
        @keyframes fall {
          0% { transform: translateY(-10px) rotate(0deg) scale(1); opacity: 1; }
          100% { transform: translateY(100vh) rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body class="no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 價值觀成語題庫資料 ---
        const ALL_PIECES_DATA = [
          { word: '滴水穿石', image: '💧🪨', value: '堅毅' },
          { word: '同舟共濟', image: '🚣🤝', value: '團結' },
          { word: '拾金不昧', image: '💰🙅‍♂️', value: '誠信' },
          { word: '廢寢忘食', image: '🚫🛏️🍚', value: '勤奮' },
          { word: '守望相助', image: '👀🤝', value: '關愛' },
          { word: '推己及人', image: '👉💭👈', value: '同理心' },
          { word: '尊老愛幼', image: '👴❤️👶', value: '孝親' },
          { word: '負荊請罪', image: '🌿🙇‍♂️', value: '承擔精神' }
        ];

        let globalAudioCtx = null;

        const getAudioCtx = () => {
          if (!globalAudioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) { globalAudioCtx = new AudioContext(); }
          }
          return globalAudioCtx;
        };

        const unlockAudio = async () => {
          const ctx = getAudioCtx();
          if (ctx && ctx.state === 'suspended') { await ctx.resume(); }
          if (ctx) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            gain.gain.value = 0;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          }
        };

        const playDropSound = () => {
          const ctx = getAudioCtx();
          if (!ctx) return;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15); 
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.15);
        };

        const playSuccessSound = () => {
          const ctx = getAudioCtx();
          if (!ctx) return;
          const playTone = (freq, startTime, duration) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.3, startTime + 0.05); 
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration); 
            osc.start(startTime);
            osc.stop(startTime + duration);
          };
          const now = ctx.currentTime;
          playTone(523.25, now, 0.4); 
          playTone(659.25, now + 0.1, 0.4); 
          playTone(783.99, now + 0.2, 0.4); 
          playTone(1046.50, now + 0.3, 0.8); 
        };

        const getRandomPieces = () => {
          const shuffled = [...ALL_PIECES_DATA].sort(() => 0.5 - Math.random());
          return shuffled.slice(0, 3).map((item, index) => ({
            id: index,
            word: item.word,
            image: item.image,
            targetId: `target-${index}`,
            isPlaced: false
          }));
        };

        const Confetti = () => {
          const colors = ['bg-red-500', 'bg-yellow-400', 'bg-blue-500', 'bg-green-500', 'bg-pink-500'];
          return (
            <div className="absolute inset-0 overflow-hidden pointer-events-none z-50">
              {[...Array(60)].map((_, i) => (
                <div
                  key={i}
                  className={`absolute w-3 h-3 md:w-5 md:h-5 ${colors[i % colors.length]} rounded-full opacity-90 shadow-sm`}
                  style={{
                    left: `${Math.random() * 100}%`,
                    top: `-5%`,
                    animation: `fall ${Math.random() * 3 + 2}s linear ${Math.random() * 2}s infinite`
                  }}
                />
              ))}
            </div>
          );
        };

        const CutePanda = ({ isVisible }) => (
          <div className={`absolute bottom-[16vh] md:bottom-[14vh] right-4 md:right-10 transition-all duration-700 ease-out z-[45] ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-[200%] opacity-0 pointer-events-none'}`}>
            <svg width="180" height="220" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" className="w-[120px] md:w-[180px] h-auto drop-shadow-xl">
              {/* 熊貓本體 */}
              <circle cx="40" cy="50" r="25" fill="#1f2937" />
              <circle cx="160" cy="50" r="25" fill="#1f2937" />
              <circle cx="100" cy="100" r="70" fill="white" stroke="#1f2937" strokeWidth="6" />
              <ellipse cx="70" cy="95" rx="20" ry="25" fill="#1f2937" transform="rotate(-15 70 95)" />
              <ellipse cx="130" cy="95" rx="20" ry="25" fill="#1f2937" transform="rotate(15 130 95)" />
              <circle cx="75" cy="90" r="6" fill="white" />
              <circle cx="125" cy="90" r="6" fill="white" />
              <ellipse cx="100" cy="120" rx="10" ry="6" fill="#1f2937" />
              <path d="M 90 135 Q 100 145 110 135" fill="none" stroke="#1f2937" strokeWidth="4" strokeLinecap="round" />
              
              {/* 加大的牌子以容納兩行字 */}
              <rect x="10" y="145" width="180" height="75" rx="15" fill="#fbbf24" stroke="#b45309" strokeWidth="6" />
              <text x="100" y="178" fontSize="24" fontWeight="bold" textAnchor="middle" fill="#b45309">大成功！</text>
              <text x="100" y="206" fontSize="18" fontWeight="bold" textAnchor="middle" fill="#b45309">1樓密碼：1</text>
              
              <circle cx="30" cy="170" r="15" fill="#1f2937" />
              <circle cx="170" cy="170" r="15" fill="#1f2937" />
            </svg>
          </div>
        );

        // 新的 TargetHole 設計：改為長條形 (Pill shape) 適應四字成語
        const TargetHole = ({ placed, word }) => (
          <div className={`w-full h-full flex items-center justify-center rounded-full transition-all duration-300 ${placed ? 'bg-green-50 shadow-[inset_0_3px_10px_rgba(0,0,0,0.1)] border-[4px] md:border-[6px] border-green-500' : 'bg-stone-200/60 border-[4px] md:border-[6px] border-dashed border-stone-400 backdrop-blur-sm'}`}>
            {placed && (
              <span className="font-bold text-green-800 text-center tracking-widest whitespace-nowrap" style={{ fontSize: 'clamp(1.2rem, 3.5vh, 2.2rem)' }}>{word}</span>
            )}
          </div>
        );

        // WordPiece 調整
        const WordPiece = ({ word, isDragging }) => (
          <div className={`px-5 py-3 sm:px-6 sm:py-4 md:px-8 md:py-4 lg:px-10 lg:py-5 bg-white border-[4px] md:border-[6px] border-blue-800 rounded-full flex items-center justify-center cursor-grab active:cursor-grabbing transition-all duration-200 ${isDragging ? 'shadow-none' : 'shadow-[0_8px_20px_rgba(0,0,0,0.12)]'}`}>
            <span className="font-bold text-blue-900 whitespace-nowrap tracking-wider" style={{ fontSize: 'clamp(1.2rem, 2.5vh, 2rem)' }}>{word}</span>
          </div>
        );

        function App() {
          const [gameStarted, setGameStarted] = useState(false);
          const [pieces, setPieces] = useState(getRandomPieces());
          const [draggingId, setDraggingId] = useState(null);
          const [dragPos, setDragPos] = useState({ x: 0, y: 0 });
          const [isWin, setIsWin] = useState(false);
          
          useEffect(() => {
            if (pieces.length > 0 && pieces.every(p => p.isPlaced)) {
              setTimeout(() => {
                setIsWin(true);
                playSuccessSound();
              }, 300);
            }
          }, [pieces]);

          const handlePointerDown = (e, id) => {
            if (isWin) return;
            e.preventDefault(); 
            e.currentTarget.setPointerCapture(e.pointerId); 
            setDraggingId(id);
            setDragPos({ x: e.clientX, y: e.clientY });
          };

          const handlePointerMove = (e) => {
            if (draggingId !== null) {
              setDragPos({ x: e.clientX, y: e.clientY });
            }
          };

          const handlePointerUp = (e, id) => {
            if (draggingId === null) return;
            const targetEl = document.getElementById(`target-${id}`);
            if (targetEl) {
              const rect = targetEl.getBoundingClientRect();
              const targetCenterX = rect.left + rect.width / 2;
              const targetCenterY = rect.top + rect.height / 2;
              const distance = Math.hypot(e.clientX - targetCenterX, e.clientY - targetCenterY);
              
              // 放寬吸附判定：對於長條形，使用較大的寬容度
              const snapThreshold = rect.width * 0.8; 
              if (distance < snapThreshold) {
                setPieces(prev => prev.map(p => p.id === id ? { ...p, isPlaced: true } : p));
                playDropSound(); 
              }
            }
            setDraggingId(null);
            if (e.currentTarget.hasPointerCapture(e.pointerId)) {
              e.currentTarget.releasePointerCapture(e.pointerId);
            }
          };

          const handleRestart = () => {
            setIsWin(false);
            setPieces(getRandomPieces());
          };

          // --- 開始畫面 ---
          if (!gameStarted) {
            return (
              <div className="fixed inset-0 w-full flex flex-col items-center justify-center p-6 touch-none bg-amber-50">
                <h1 className="text-4xl md:text-7xl font-black text-amber-700 tracking-widest drop-shadow-sm mb-12 text-center" style={{ fontFamily: "'Noto Serif TC', serif" }}>
                  猜猜成語
                </h1>
                <button 
                  onClick={() => { unlockAudio(); setGameStarted(true); }}
                  className="px-12 py-6 md:px-16 md:py-8 bg-amber-400 text-amber-900 font-bold rounded-full border-[6px] border-amber-600 hover:bg-amber-300 shadow-[0_15px_30px_rgba(0,0,0,0.15)] active:scale-95 transition-all text-2xl md:text-4xl animate-bounce"
                >
                  開始遊戲
                </button>
              </div>
            );
          }

          // --- 遊戲主畫面 ---
          return (
            <div className="fixed inset-0 w-full flex flex-col overflow-hidden touch-none bg-amber-50" onPointerMove={handlePointerMove}>
              {/* 頂部標題 */}
              <div className="flex-none w-full text-center py-3 md:py-5 z-20 bg-white/60 backdrop-blur-md shadow-sm border-b border-amber-200">
                <h1 className="text-2xl md:text-4xl font-black text-amber-800 tracking-wider mb-2" style={{ fontFamily: "'Noto Serif TC', serif" }}>猜猜成語</h1>
                <p className="text-amber-700 font-bold text-sm md:text-lg px-4">把下方的成語拖曳到對應的 Emoji 線索旁邊吧！</p>
              </div>

              {/* 中間遊戲區 (題板列表排版) */}
              <div className="flex-1 relative flex flex-col items-center justify-center w-full z-10 px-4 md:px-8 py-4 min-h-0 gap-4 md:gap-8">
                
                {/* 勝利光芒 */}
                <div 
                  className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[90vh] h-[90vh] pointer-events-none transition-opacity duration-1000 ${isWin ? 'opacity-80' : 'opacity-0'}`}
                  style={{ background: 'radial-gradient(circle, rgba(253,224,71,0.5) 0%, rgba(250,204,21,0) 65%)' }}
                ></div>
                
                {/* 三個題目列 */}
                <div className="w-full max-w-3xl flex flex-col gap-4 md:gap-8 z-10">
                  {pieces.map((p) => (
                    <div key={`row-${p.id}`} className={`flex flex-row items-center justify-between bg-white/80 rounded-full p-3 md:p-5 shadow-sm border-[4px] border-white transition-all duration-500 ${isWin ? 'drop-shadow-lg scale-105' : ''}`}>
                      <div className="flex items-center gap-2 md:gap-6 pl-2 md:pl-4">
                        <div className="text-4xl md:text-6xl tracking-widest drop-shadow-sm">{p.image}</div>
                      </div>
                      
                      {/* 目標接收區 (長條形) */}
                      <div id={`target-${p.id}`} className="w-44 h-14 md:w-64 md:h-20 relative">
                        <TargetHole placed={p.isPlaced} word={p.word} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 底部詞語托盤 */}
              <div 
                className={`flex-none w-full bg-white/90 backdrop-blur-xl border-t-[6px] border-amber-200 rounded-t-[30px] md:rounded-t-[40px] flex justify-center items-center gap-3 sm:gap-6 md:gap-12 z-30 shadow-[0_-15px_30px_rgba(0,0,0,0.06)] transition-transform duration-500 pt-5 px-4 ${isWin ? 'translate-y-full' : 'translate-y-0'}`}
                style={{ paddingBottom: 'calc(1.5rem + env(safe-area-inset-bottom))' }}
              >
                {pieces.map((p) => !p.isPlaced && (
                  <div key={p.id} onPointerDown={(e) => handlePointerDown(e, p.id)} onPointerUp={(e) => handlePointerUp(e, p.id)} onPointerCancel={(e) => handlePointerUp(e, p.id)} className={`cursor-grab touch-none ${draggingId === p.id ? 'opacity-0' : 'hover:-translate-y-2 active:scale-95 transition-transform duration-200'}`}>
                    <WordPiece word={p.word} isDragging={false} />
                  </div>
                ))}
              </div>

              {/* 拖動中的詞語 */}
              {draggingId !== null && (
                <div className="fixed pointer-events-none z-[100]" style={{ left: dragPos.x, top: dragPos.y, transform: 'translate(-50%, -50%) scale(1.2)', filter: 'drop-shadow(0 25px 25px rgba(0,0,0,0.3))' }}>
                  <WordPiece word={pieces.find(p => p.id === draggingId).word} isDragging={true} />
                </div>
              )}

              {/* 通關慶祝 */}
              {isWin && <Confetti />}
              <CutePanda isVisible={isWin} />
              
              {/* 再玩一次按鈕 */}
              {isWin && (
                <button onClick={handleRestart} className="absolute bottom-[6vh] md:bottom-[8vh] left-1/2 -translate-x-1/2 px-8 py-4 md:px-12 md:py-5 bg-amber-400 text-amber-900 font-bold rounded-full border-[4px] md:border-[6px] border-amber-500 hover:bg-amber-300 shadow-[0_10px_20px_rgba(0,0,0,0.2)] z-50 animate-bounce text-xl md:text-3xl whitespace-nowrap" style={{ fontFamily: "'Noto Serif TC', serif" }}>再玩一次</button>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
