name: Update HKO weather cache

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hko-weather-cache

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch HKO headquarters weather
        run: |
          mkdir -p eta/outputs/data
          curl -fsSL "https://www.hko.gov.hk/PDADATA/locspc/data/gridData/0906_tc.xml" -o /tmp/hko-0906.json
          python3 - <<'PY'
          import json

          with open("/tmp/hko-0906.json", encoding="utf-8") as source:
              data = json.load(source)

          weather = data["RegionalWeather"]
          output = {
              "station": "HKO",
              "place": "香港天文台",
              "temperature": float(weather["Temp"]["Value"]),
              "humidity": int(weather["RH"]["Value"]),
              "obsTime": weather["ObsTime"],
              "displayTime": weather.get("DisplayTime"),
              "source": "https://www.hko.gov.hk/PDADATA/locspc/data/gridData/0906_tc.xml",
          }

          with open("eta/outputs/data/hko-hq-weather.json", "w", encoding="utf-8") as target:
              json.dump(output, target, ensure_ascii=False, indent=2)
              target.write("\n")
          PY

      - name: Commit updated weather cache
        run: |
          if git diff --quiet eta/outputs/data/hko-hq-weather.json; then
            echo "Weather cache unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eta/outputs/data/hko-hq-weather.json
          git commit -m "Update HKO weather cache"
          git push
