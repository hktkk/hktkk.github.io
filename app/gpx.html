<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX 航點高度補全工具 (含地圖預覽)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Leaflet 地圖庫的 CSS 與 JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-6">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">GPX 航點高度補全工具</h1>
        
        <p class="text-gray-600 text-center mb-8">
            上傳你的 GPX 檔案，系統會自動在地圖上顯示路徑，並使用 Open-Elevation API 補齊缺失的高度資訊。
        </p>

        <!-- 步驟 1: 上傳檔案 -->
        <div class="mb-8 border-2 border-dashed border-gray-300 rounded-lg p-8 text-center" id="drop-zone">
            <input type="file" id="gpx-file" accept=".gpx" class="hidden">
            <label for="gpx-file" class="cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded inline-flex items-center transition duration-300">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                選擇 GPX 檔案
            </label>
            <p class="mt-4 text-sm text-gray-500" id="file-name-display">尚未選擇檔案</p>
            
            <div class="mt-4">
                <span class="text-gray-500 text-sm">或</span>
                <button id="create-empty-btn" class="ml-2 text-blue-600 underline hover:text-blue-800 text-sm">建立空白 GPX 檔</button>
            </div>
        </div>

        <!-- 處理進度區塊 -->
        <div id="processing-section" class="hidden mb-8">
            <h2 class="text-xl font-semibold mb-4">處理狀態</h2>
            <div class="w-full bg-gray-200 rounded-full h-4 mb-2">
                <div id="progress-bar" class="bg-blue-600 h-4 rounded-full" style="width: 0%"></div>
            </div>
            <p id="status-text" class="text-sm text-gray-600">準備處理...</p>
            
            <div class="mt-4 max-h-40 overflow-y-auto bg-gray-50 p-4 rounded border text-sm" id="log-console">
                <!-- 處理日誌會顯示在這裡 -->
            </div>
        </div>

        <!-- 地圖預覽區塊 -->
        <div id="map-section" class="hidden mb-8">
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-xl font-semibold text-gray-800">🗺️ 地圖預覽</h3>
                <p class="text-sm text-blue-600 font-medium animate-pulse">💡 提示：點擊地圖可自動填入下方座標！</p>
            </div>
            <!-- 地圖容器，需設定明確高度 -->
            <div id="map-container" class="w-full h-96 rounded-lg shadow-inner border border-gray-300 z-0"></div>
        </div>

        <!-- 手動新增航點區塊 -->
        <div id="add-waypoint-section" class="hidden mb-8 border border-blue-200 rounded-lg p-6 bg-blue-50 shadow-inner">
            <h3 class="text-xl font-semibold text-blue-800 mb-4">📍 手動新增航點</h3>
            <p class="text-sm text-gray-600 mb-4">輸入經緯度與名稱（或直接點擊上方地圖），系統將自動取得高度並在地圖與檔案中標記。</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">緯度 (Lat) <span class="text-red-500">*</span></label>
                    <input type="number" step="any" id="wpt-lat" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border bg-white" placeholder="例: 25.0339">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">經度 (Lon) <span class="text-red-500">*</span></label>
                    <input type="number" step="any" id="wpt-lon" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border bg-white" placeholder="例: 121.5644">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">名稱 (Name)</label>
                    <input type="text" id="wpt-name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2 border bg-white" placeholder="例: 台北101 (選填)">
                </div>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <button id="add-wpt-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-300">
                    新增並取得高度
                </button>
                <p id="add-wpt-status" class="text-sm font-medium"></p>
            </div>
        </div>

        <!-- 步驟 3: 下載按鈕 -->
        <div id="download-section" class="hidden text-center mt-8 pt-6 border-t border-gray-200">
            <h3 class="text-xl font-semibold text-green-600 mb-4">處理完成！</h3>
            <button id="download-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded shadow-lg transition duration-300 text-lg">
                下載更新後的 GPX 檔案
            </button>
        </div>
    </div>

    <script>
        // DOM 元素參考
        const fileInput = document.getElementById('gpx-file');
        const fileNameDisplay = document.getElementById('file-name-display');
        const processingSection = document.getElementById('processing-section');
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const logConsole = document.getElementById('log-console');
        const downloadSection = document.getElementById('download-section');
        const downloadBtn = document.getElementById('download-btn');

        const createEmptyBtn = document.getElementById('create-empty-btn');
        const addWaypointSection = document.getElementById('add-waypoint-section');
        const mapSection = document.getElementById('map-section');
        const wptLatInput = document.getElementById('wpt-lat');
        const wptLonInput = document.getElementById('wpt-lon');
        const wptNameInput = document.getElementById('wpt-name');
        const addWptBtn = document.getElementById('add-wpt-btn');
        const addWptStatus = document.getElementById('add-wpt-status');

        let originalFileName = "";
        let finalGpxString = "";
        let currentXmlDoc = null; 

        // 地圖相關變數
        let map = null;
        let mapFeatureGroup = null; // 用來裝載軌跡和航點，方便縮放視角

        // -------------------------
        // 地圖初始化與渲染功能
        // -------------------------
        function initMap() {
            if (map) return; // 如果已經初始化過就跳過
            
            // 顯示地圖區塊
            mapSection.classList.remove('hidden');

            // 預設中心點 (台灣中心)
            map = L.map('map-container').setView([23.6978, 120.9605], 7);
            
            // 載入 OpenStreetMap 圖資
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            mapFeatureGroup = L.featureGroup().addTo(map);

            // ✨ 加入地圖點擊事件，自動填入座標
            map.on('click', function(e) {
                wptLatInput.value = e.latlng.lat.toFixed(6);
                wptLonInput.value = e.latlng.lng.toFixed(6);
                wptLatInput.classList.add('ring-2', 'ring-blue-300');
                wptLonInput.classList.add('ring-2', 'ring-blue-300');
                setTimeout(() => {
                    wptLatInput.classList.remove('ring-2', 'ring-blue-300');
                    wptLonInput.classList.remove('ring-2', 'ring-blue-300');
                }, 500);
            });
        }

        function renderGpxOnMap(xmlDoc) {
            initMap();
            mapFeatureGroup.clearLayers(); // 清除舊圖層

            // 1. 繪製軌跡 (Track - trkpt)
            const trks = xmlDoc.getElementsByTagName('trk');
            for (let trk of trks) {
                let latlngs = [];
                const trkpts = trk.getElementsByTagName('trkpt');
                for (let pt of trkpts) {
                    latlngs.push([parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))]);
                }
                if (latlngs.length > 0) {
                    L.polyline(latlngs, {color: '#3b82f6', weight: 4, opacity: 0.8}).addTo(mapFeatureGroup);
                }
            }

            // 2. 繪製路線 (Route - rtept)
            const rtes = xmlDoc.getElementsByTagName('rte');
            for (let rte of rtes) {
                let latlngs = [];
                const rtepts = rte.getElementsByTagName('rtept');
                for (let pt of rtepts) {
                    latlngs.push([parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))]);
                }
                if (latlngs.length > 0) {
                    L.polyline(latlngs, {color: '#8b5cf6', weight: 4, opacity: 0.8, dashArray: '5, 10'}).addTo(mapFeatureGroup);
                }
            }

            // 3. 繪製航點 (Waypoint - wpt)
            const wpts = xmlDoc.getElementsByTagName('wpt');
            for (let wpt of wpts) {
                const lat = parseFloat(wpt.getAttribute('lat'));
                const lon = parseFloat(wpt.getAttribute('lon'));
                const nameNode = wpt.getElementsByTagName('name')[0];
                const eleNode = wpt.getElementsByTagName('ele')[0];
                
                const name = nameNode ? nameNode.textContent : '未命名航點';
                const ele = eleNode ? `${parseFloat(eleNode.textContent).toFixed(1)}m` : '無高度';
                
                L.marker([lat, lon]).bindPopup(`<b>${name}</b><br>高度: ${ele}`).addTo(mapFeatureGroup);
            }

            // 自動縮放視角以包含所有元素
            if (mapFeatureGroup.getLayers().length > 0) {
                // 確保容器顯示後再調整大小，否則 Leaflet 計算會有誤
                setTimeout(() => {
                    map.invalidateSize();
                    map.fitBounds(mapFeatureGroup.getBounds(), {padding: [30, 30], maxZoom: 15});
                }, 100);
            }
        }

        // -------------------------
        // 核心邏輯
        // -------------------------
        function log(message, isError = false) {
            const p = document.createElement('p');
            p.textContent = message;
            p.className = isError ? 'text-red-500' : 'text-gray-700';
            logConsole.appendChild(p);
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        // 監聽檔案上傳
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            originalFileName = file.name;
            fileNameDisplay.textContent = `已選擇: ${originalFileName}`;
            
            resetUI();
            
            const reader = new FileReader();
            reader.onload = function(event) {
                processGPX(event.target.result);
            };
            reader.readAsText(file);
        });

        // 建立空白 GPX 檔案邏輯
        createEmptyBtn.addEventListener('click', function() {
            originalFileName = "custom_waypoints.gpx";
            fileNameDisplay.textContent = `已建立: 空白 GPX`;
            
            resetUI();
            
            const emptyGpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx version="1.1" creator="GPX Tool" xmlns="http://www.topografix.com/GPX/1/1">
</gpx>`;
            processGPX(emptyGpx);
        });

        function resetUI() {
            processingSection.classList.remove('hidden');
            downloadSection.classList.add('hidden');
            addWaypointSection.classList.add('hidden');
            logConsole.innerHTML = '';
            progressBar.style.width = '0%';
        }

        async function fetchElevation(lat, lon) {
            const url = `https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`;
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].elevation;
                }
            } catch (error) {
                console.error("API 錯誤:", error);
                log(`API 查詢失敗 (lat:${lat}, lon:${lon}): ${error.message}`, true);
                return null;
            }
            return null;
        }

        async function processGPX(xmlString) {
            statusText.textContent = "正在解析 GPX 檔案...";
            log("開始解析 GPX 結構...");

            const parser = new DOMParser();
            currentXmlDoc = parser.parseFromString(xmlString, "application/xml");
            
            if (currentXmlDoc.getElementsByTagName("parsererror").length > 0) {
                log("GPX 檔案格式錯誤，無法解析。", true);
                statusText.textContent = "解析失敗";
                return;
            }

            // 解析成功後，立刻在地圖上顯示現有內容
            renderGpxOnMap(currentXmlDoc);

            const waypoints = Array.from(currentXmlDoc.getElementsByTagName("wpt"));
            log(`找到 ${waypoints.length} 個航點。`);

            const wptsToProcess = waypoints.filter(wpt => wpt.getElementsByTagName("ele").length === 0);
            log(`其中 ${wptsToProcess.length} 個航點缺少高度資訊，準備查詢。`);

            if (wptsToProcess.length === 0) {
                log("所有航點皆已有高度資訊，無須自動補全。");
                finishProcessing();
                return;
            }

            for (let i = 0; i < wptsToProcess.length; i++) {
                const wpt = wptsToProcess[i];
                const lat = wpt.getAttribute("lat");
                const lon = wpt.getAttribute("lon");
                const nameNode = wpt.getElementsByTagName("name")[0];
                const wptName = nameNode ? nameNode.textContent : `點 ${i+1}`;

                log(`查詢 [${wptName}] 的高度...`);
                statusText.textContent = `處理中: ${i + 1} / ${wptsToProcess.length}`;
                progressBar.style.width = `${((i) / wptsToProcess.length) * 100}%`;

                const elevation = await fetchElevation(lat, lon);

                if (elevation !== null) {
                    const eleNode = currentXmlDoc.createElement("ele");
                    eleNode.textContent = elevation.toFixed(1);
                    if (wpt.firstChild) wpt.insertBefore(eleNode, wpt.firstChild);
                    else wpt.appendChild(eleNode);
                    log(`[${wptName}] 獲得高度: ${elevation}m`);
                } else {
                    log(`[${wptName}] 無法獲得高度。`, true);
                }

                await new Promise(r => setTimeout(r, 600)); 
            }

            progressBar.style.width = '100%';
            log("查詢完成！");
            
            // 高度更新完畢後，重繪一次地圖以更新標記彈出視窗的高度資訊
            renderGpxOnMap(currentXmlDoc);
            finishProcessing();
        }

        function updateFinalGpxString() {
            if (!currentXmlDoc) return;
            const serializer = new XMLSerializer();
            finalGpxString = '<?xml version="1.0" encoding="UTF-8"?>\n' + serializer.serializeToString(currentXmlDoc);
        }

        function finishProcessing() {
            statusText.textContent = "處理完成，準備產生檔案...";
            updateFinalGpxString();
            downloadSection.classList.remove('hidden');
            addWaypointSection.classList.remove('hidden');
            statusText.textContent = "準備就緒！";
        }

        // 手動新增航點邏輯
        addWptBtn.addEventListener('click', async function() {
            if (!currentXmlDoc) return;
            
            const lat = parseFloat(wptLatInput.value);
            const lon = parseFloat(wptLonInput.value);
            const name = wptNameInput.value.trim() || '自訂航點';

            if (isNaN(lat) || isNaN(lon)) {
                addWptStatus.textContent = "❌ 請輸入有效的緯度與經度數字。";
                addWptStatus.className = "text-sm font-medium text-red-500";
                return;
            }

            addWptStatus.textContent = "⏳ 正在取得高度資訊...";
            addWptStatus.className = "text-sm font-medium text-blue-500";
            addWptBtn.disabled = true;
            addWptBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const elevation = await fetchElevation(lat, lon);

                // 1. 加入到 XML DOM 中
                const newWpt = currentXmlDoc.createElement("wpt");
                newWpt.setAttribute("lat", lat);
                newWpt.setAttribute("lon", lon);

                let eleMsg = '無法取得';
                if (elevation !== null) {
                    const eleNode = currentXmlDoc.createElement("ele");
                    eleNode.textContent = elevation.toFixed(1);
                    newWpt.appendChild(eleNode);
                    eleMsg = `${elevation.toFixed(1)}m`;
                }

                const nameNode = currentXmlDoc.createElement("name");
                nameNode.textContent = name;
                newWpt.appendChild(nameNode);

                const gpxNode = currentXmlDoc.getElementsByTagName("gpx")[0];
                if (gpxNode) {
                    const trks = gpxNode.getElementsByTagName("trk");
                    const rtes = gpxNode.getElementsByTagName("rte");
                    let insertBeforeNode = null;
                    if (rtes.length > 0) insertBeforeNode = rtes[0];
                    else if (trks.length > 0) insertBeforeNode = trks[0];

                    if (insertBeforeNode) gpxNode.insertBefore(newWpt, insertBeforeNode);
                    else gpxNode.appendChild(newWpt);

                    // 2. 更新文字紀錄與供下載的字串
                    log(`✅ 手動新增航點 [${name}] (${lat}, ${lon})，高度: ${eleMsg}`);
                    addWptStatus.textContent = `✅ 成功加入！高度為 ${eleMsg}`;
                    addWptStatus.className = "text-sm font-medium text-green-600";
                    updateFinalGpxString();

                    // 3. ✨ 即時在地圖上加入標記並移動視角
                    if (map && mapFeatureGroup) {
                        const marker = L.marker([lat, lon])
                                        .bindPopup(`<b>${name}</b><br>高度: ${eleMsg}`)
                                        .addTo(mapFeatureGroup);
                        marker.openPopup();
                        map.setView([lat, lon], 14); // 縮放到適合看清楚周遭的層級
                    }

                    // 清空輸入框名稱(保留座標方便微調)
                    wptNameInput.value = '';
                } else {
                    throw new Error("找不到 GPX 根節點");
                }
            } catch (error) {
                addWptStatus.textContent = "❌ 新增失敗，請查看日誌。";
                addWptStatus.className = "text-sm font-medium text-red-500";
                log(`手動新增錯誤: ${error.message}`, true);
            } finally {
                addWptBtn.disabled = false;
                addWptBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        // 下載按鈕事件
        downloadBtn.addEventListener('click', function() {
            if (!finalGpxString) return;

            const blob = new Blob([finalGpxString], { type: 'application/gpx+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            const newFileName = originalFileName.replace('.gpx', '_with_ele.gpx');
            a.download = newFileName;
            
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
        });

    </script>
</body>
</html>
