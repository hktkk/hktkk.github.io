<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九巴月票回本追蹤器</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="九巴追蹤">
    <meta name="theme-color" content="#f3f4f6">
    <link rel="apple-touch-icon" href="https://i.imgur.com/ukbs2uj.png">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // 初始化 PWA Manifest (保留 Manifest 以支援加到主畫面)
        const manifest = { name: "九巴月票回本追蹤器", short_name: "九巴追蹤", start_url: ".", display: "standalone", background_color: "#f3f4f6", theme_color: "#f3f4f6", icons: [{ src: "https://i.imgur.com/ukbs2uj.png", sizes: "512x512", type: "image/png" }] };
        document.head.appendChild(Object.assign(document.createElement('link'), { rel: 'manifest', href: URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/json' })) }));
        
        // 註：移除了 Blob Service Worker 註冊，以避免在 Safari 及嚴格的安全環境中報錯。
        // iOS Safari 只需要上方的 meta 標籤與 manifest 即可支援「加到主畫面」。
    </script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glow-success { box-shadow: 0 0 15px 5px rgba(34, 197, 94, 0.3); }

        /* Bottom Sheet 確認卡 */
        #fareSheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            transform: translateY(100%);
            transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 50;
        }
        #fareSheet.open { transform: translateY(0); }

        /* 遮罩 */
        #sheetOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
            z-index: 40;
        }
        #sheetOverlay.open { opacity: 1; pointer-events: auto; }

        /* Toast 提示 */
        #toast {
            position: fixed;
            bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 60;
            pointer-events: none;
            white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen pb-10">
    <div class="max-w-md mx-auto w-full pt-4 px-4 space-y-4">
        
        <header class="flex items-center justify-between py-2">
            <div>
                <h1 class="text-2xl font-bold text-red-600 tracking-tight">🚌 九巴月票追蹤器</h1>
                <p class="text-xs text-gray-500 mt-1">你的每日搭車回本好幫手</p>
            </div>
            <button id="toggleConfigBtn" class="p-2 bg-white rounded-full shadow text-gray-600 hover:text-red-600">⚙️</button>
        </header>

        <!-- 設定區塊 -->
        <section id="configSection" class="bg-white rounded-2xl shadow-sm p-4 hidden border border-gray-100">
            <h2 class="text-sm font-bold text-gray-700 mb-3 border-b pb-2">基本設定</h2>
            <div class="grid grid-cols-2 gap-3 text-sm">
                <label class="flex flex-col text-xs text-gray-500">月票單價 ($)<input type="number" id="passPrice" inputmode="decimal" class="border rounded-lg p-2 mt-1 outline-none focus:ring-2 focus:ring-red-400 text-black"></label>
                <label class="flex flex-col text-xs text-gray-500">購買數量<select id="passQty" class="border rounded-lg p-2 mt-1 outline-none focus:ring-2 focus:ring-red-400 text-black bg-white"><option value="1">1 張 (30日)</option><option value="2">2 張 (60日)</option></select></label>
                <label class="flex flex-col col-span-2 text-xs text-gray-500">啟用日期<input type="date" id="startDate" class="border rounded-lg p-2 mt-1 outline-none focus:ring-2 focus:ring-red-400 text-black"></label>
                <div class="col-span-2 border-t pt-2 mt-1">
                    <label class="text-xs text-gray-500 mb-2 block">自訂快捷車費 (最多6個，留白隱藏)</label>
                    <div id="qfInputs" class="grid grid-cols-3 gap-2"></div>
                </div>
            </div>
            <!-- 儲存設定按鈕 -->
            <div class="mt-4 pt-3 border-t">
                <button id="saveConfigBtn" class="w-full bg-red-600 hover:bg-red-700 active:scale-95 text-white font-bold py-2.5 rounded-xl shadow-sm transition text-sm">儲存設定</button>
            </div>
        </section>

        <!-- 儀表板 -->
        <section id="dashboardSection" class="bg-white rounded-2xl shadow-md p-5 relative overflow-hidden border border-gray-100">
            <div class="absolute -right-6 -top-6 text-7xl opacity-5">🎯</div>
            <div class="flex justify-between items-end mb-2">
                <div>
                    <p class="text-xs text-gray-500">已搭車費 / 目標</p>
                    <div class="text-3xl font-black tracking-tight">$<span id="totalFare">0.0</span><span class="text-sm text-gray-400 font-normal"> / $<span id="targetAmount">800</span></span></div>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-500">剩餘日數</p>
                    <p class="text-lg font-bold text-red-500"><span id="daysRemaining">0</span> 日</p>
                    <p class="text-[10px] text-gray-400">至 <span id="expiryDate"></span></p>
                </div>
            </div>
            <div class="bg-gray-100 rounded-full h-3 mt-4 mb-2"><div id="progressBar" class="h-3 rounded-full transition-all duration-700 w-0"></div></div>
            <div id="statusAlert" class="mt-4 p-3 rounded-xl text-sm border flex items-start gap-2">
                <span id="statusIcon">💡</span>
                <div><p id="statusMsg" class="font-medium"></p><p id="dailyTargetMsg" class="text-xs mt-0.5"></p></div>
            </div>
        </section>

        <!-- 輸入區 -->
        <section class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
            <h2 class="text-sm font-bold text-gray-700 mb-3">記低車費</h2>
            <form id="addRecordForm" class="flex gap-2">
                <div class="relative flex-1"><span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">$</span><input type="number" id="fareInput" step="0.1" placeholder="0.0" inputmode="decimal" required class="w-full pl-7 pr-3 py-3 bg-gray-50 border rounded-xl focus:ring-2 focus:ring-red-400 outline-none text-lg font-bold"></div>
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 rounded-xl shadow-md active:scale-95 transition">加入</button>
            </form>
            <div class="mt-3"><p class="text-[10px] text-gray-400 mb-2">快捷輸入</p><div id="quickButtons" class="flex flex-wrap gap-2"></div></div>
        </section>

        <!-- 紀錄清單 -->
        <section class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
            <div class="flex justify-between items-center mb-3"><h2 class="text-sm font-bold text-gray-700">搭車記錄</h2><span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded-md"><span id="recordCount">0</span> 筆</span></div>
            <div class="max-h-60 overflow-y-auto pr-1"><ul id="recordList" class="space-y-2"></ul><div id="emptyState" class="text-center py-6 text-gray-400 text-sm hidden">🚏 仲未有記錄！</div></div>
        </section>

        <div class="text-center mt-6"><button id="resetBtn" class="text-xs text-red-400 underline">🗑️ 清空並開新月份</button></div>
    </div>

    <!-- 遮罩 -->
    <div id="sheetOverlay"></div>

    <!-- Bottom Sheet：車費確認卡 -->
    <div id="fareSheet" class="bg-white rounded-t-3xl shadow-2xl px-6 pt-5 pb-8 max-w-md mx-auto">
        <div class="w-10 h-1 bg-gray-200 rounded-full mx-auto mb-5"></div>
        <p class="text-xs text-gray-400 text-center mb-1">確認加入車費</p>
        <p class="text-4xl font-black text-center text-gray-800 mb-6">$<span id="sheetAmount">0.0</span></p>
        <div class="flex gap-3">
            <button id="sheetCancelBtn" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-semibold text-sm active:scale-95 transition">取消</button>
            <button id="sheetConfirmBtn" class="flex-2 flex-grow-[2] py-3 rounded-xl bg-red-600 hover:bg-red-700 text-white font-bold text-sm shadow-md active:scale-95 transition">✓ 確認加入</button>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="bg-gray-800 text-white text-xs font-medium px-4 py-2 rounded-full shadow-lg"></div>

    <script>
        const els = Object.fromEntries(['configSection','passPrice','passQty','startDate','qfInputs','totalFare','targetAmount','daysRemaining','expiryDate','progressBar','dashboardSection','statusAlert','statusIcon','statusMsg','dailyTargetMsg','addRecordForm','fareInput','quickButtons','recordList','recordCount','emptyState'].map(id => [id, document.getElementById(id)]));
        let state = { config: { price: 800, qty: 1, startDate: new Date().toISOString().split('T')[0], quickFares: [5.4, 7.5, 10.4, 14.2, 19.3, 20.8] }, records: [] };

        // 暫存待確認的車費
        let pendingFare = null;

        // 獨立的日期計算函數，處理跨月與邊界情況
        function calculateDates(startDateStr, qty) {
            const totalDays = 30 * qty;
            const startDay = new Date(startDateStr);
            startDay.setHours(0, 0, 0, 0);

            const expiryDate = new Date(startDay);
            expiryDate.setDate(startDay.getDate() + totalDays - 1);

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const diffTime = expiryDate.getTime() - today.getTime();
            let daysRem = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // 包含今天
            
            if (daysRem <= 0) daysRem = 0;

            return { totalDays, expiryDate, daysRem };
        }

        function init() {
            try { 
                const saved = JSON.parse(localStorage.getItem('kmb_data')); 
                if(saved) state = { ...state, ...saved, config: {...state.config, ...saved.config} }; 
            } catch(e){}
            
            // 確保有 6 個長度的陣列，避免舊資料錯位
            while(state.config.quickFares.length < 6) state.config.quickFares.push(null);
            
            // 動態生成快捷設定框 (加入 inputmode="decimal" 喚起數字鍵盤)
            els.qfInputs.innerHTML = Array(6).fill(0).map((_, i) => `<input type="number" step="0.1" inputmode="decimal" class="qf-cfg border rounded-lg p-2 text-center text-sm outline-none bg-gray-50 focus:ring-2" placeholder="+">`).join('');
            
            // 綁定輸入同步（移除即時 change 儲存，改由「儲存設定」按鈕觸發）
            els.passPrice.value = state.config.price; 
            els.passQty.value = state.config.qty; 
            els.startDate.value = state.config.startDate;
            
            document.querySelectorAll('.qf-cfg').forEach((el, i) => { 
                el.value = state.config.quickFares[i] || ''; 
            });

            // 儲存設定按鈕
            document.getElementById('saveConfigBtn').addEventListener('click', () => {
                updateConfig();
                showToast('✓ 設定已儲存');
            });
            
            updateUI();
        }

        function updateConfig() {
            state.config = { 
                price: +els.passPrice.value || 800, 
                qty: +els.passQty.value || 1, 
                startDate: els.startDate.value, 
                quickFares: Array.from(document.querySelectorAll('.qf-cfg')).map(el => {
                    const val = parseFloat(el.value);
                    return (isNaN(val) || val <= 0) ? null : val; // 儲存 null 以保留位置
                }) 
            };
            save();
        }

        function updateUI() {
            const { price, qty, startDate, quickFares } = state.config;
            const target = price * qty;
            
            const { totalDays, expiryDate, daysRem } = calculateDates(startDate, qty);
            
            const totalFare = state.records.reduce((sum, r) => sum + r.amount, 0);
            const remain = Math.max(0, target - totalFare);
            
            // 更新儀表板數據
            els.targetAmount.innerText = target; 
            els.totalFare.innerText = totalFare.toFixed(1); 
            els.daysRemaining.innerText = daysRem;
            
            const expDateStr = `${expiryDate.getFullYear()}/${String(expiryDate.getMonth()+1).padStart(2,'0')}/${String(expiryDate.getDate()).padStart(2,'0')}`;
            els.expiryDate.innerText = expDateStr;
            
            els.progressBar.style.width = `${Math.min(100, (totalFare/target)*100)}%`;

            // 狀態邏輯格式化與展開
            const isSucc = totalFare >= target;
            const isExp = daysRem <= 0;
            const req = remain / Math.max(1, daysRem);
            
            els.dashboardSection.className = `bg-white rounded-2xl shadow-md p-5 relative overflow-hidden border ${isSucc ? 'glow-success' : ''}`;
            els.progressBar.className = `h-3 rounded-full transition-all duration-700 ${isSucc ? 'bg-green-500' : isExp ? 'bg-gray-400' : 'bg-red-500'}`;
            
            let themeColor, icon, msg, dailyMsg;
            
            if (isSucc) {
                themeColor = 'green';
                icon = '🥳';
                msg = '成功回本！';
                dailyMsg = `每程賺，共賺 $${(totalFare - target).toFixed(1)}`;
            } else if (isExp) {
                themeColor = 'gray';
                icon = '🥲';
                msg = '已過期';
                dailyMsg = `總共蝕 $${remain.toFixed(1)}`;
            } else if (req <= (target / totalDays)) {
                themeColor = 'blue';
                icon = '💪';
                msg = '進度良好';
                dailyMsg = `每日需 $${req.toFixed(1)}`;
            } else {
                themeColor = 'orange';
                icon = '🏃‍♂️';
                msg = '進度落後';
                dailyMsg = `每日需 $${req.toFixed(1)}`;
            }

            els.statusAlert.className = `mt-4 p-3 rounded-xl text-sm border flex items-start gap-2 bg-${themeColor}-50 border-${themeColor}-200`;
            els.statusIcon.innerText = icon; 
            els.statusMsg.innerText = msg; 
            els.dailyTargetMsg.innerText = dailyMsg;
            els.statusMsg.className = `font-medium text-${themeColor}-800`; 
            els.dailyTargetMsg.className = `text-xs mt-0.5 text-${themeColor}-600`;

            // 渲染快捷鍵與紀錄 (過濾 null，確保不顯示空白按鈕)
            const validFares = quickFares.filter(f => f !== null);
            els.quickButtons.innerHTML = validFares.map(f => `<button type="button" class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-xs rounded-lg font-medium active:scale-95 text-gray-700 transition" onclick="requestAddFare(${f})">$${f.toFixed(1)}</button>`).join('');
            
            els.recordCount.innerText = state.records.length;
            els.emptyState.classList.toggle('hidden', state.records.length > 0);
            els.recordList.innerHTML = [...state.records].sort((a,b)=>b.ts-a.ts).map(r => `
                <li class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border">
                    <div class="flex items-center gap-3"><div class="bg-red-100 text-red-600 w-8 h-8 rounded-full flex items-center justify-center text-xs">🚌</div>
                    <div><p class="font-bold text-gray-800">$${r.amount.toFixed(1)}</p><p class="text-[10px] text-gray-400">${new Date(r.ts).toLocaleString('zh-HK',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</p></div></div>
                    <button type="button" onclick="delFare(${r.id})" class="text-gray-300 hover:text-red-500 p-2">✕</button>
                </li>`).join('');
        }

        const save = () => { localStorage.setItem('kmb_data', JSON.stringify(state)); updateUI(); };

        // ── Bottom Sheet 確認機制 ──────────────────────────────────────
        const sheetEl      = document.getElementById('fareSheet');
        const overlayEl    = document.getElementById('sheetOverlay');
        const sheetAmount  = document.getElementById('sheetAmount');
        const sheetConfirm = document.getElementById('sheetConfirmBtn');
        const sheetCancel  = document.getElementById('sheetCancelBtn');

        function openSheet(amt) {
            pendingFare = amt;
            sheetAmount.innerText = amt.toFixed(1);
            sheetEl.classList.add('open');
            overlayEl.classList.add('open');
            if (navigator.vibrate) navigator.vibrate(30);
        }

        function closeSheet() {
            sheetEl.classList.remove('open');
            overlayEl.classList.remove('open');
            pendingFare = null;
        }

        sheetConfirm.addEventListener('click', () => {
            if (pendingFare !== null) {
                if (navigator.vibrate) navigator.vibrate(50);
                state.records.push({ id: Date.now(), ts: Date.now(), amount: pendingFare });
                els.fareInput.value = '';
                els.fareInput.blur();
                save();
                closeSheet();
                showToast(`✓ 已加入 $${pendingFare.toFixed(1)}`);
            }
        });

        sheetCancel.addEventListener('click', closeSheet);
        overlayEl.addEventListener('click', closeSheet);

        // 取代原本的 addFare：先開確認卡
        function requestAddFare(amt) {
            openSheet(amt);
        }

        // ── Toast 提示 ─────────────────────────────────────────────────
        let toastTimer = null;
        const toastEl = document.getElementById('toast');

        function showToast(msg) {
            toastEl.innerText = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2000);
        }

        // ── 刪除與重設（維持原有 confirm 彈窗）─────────────────────────
        const delFare = (id) => { if(confirm('刪除此紀錄？')) { state.records = state.records.filter(r => r.id !== id); save(); }};

        document.getElementById('toggleConfigBtn').onclick = () => els.configSection.classList.toggle('hidden');
        els.addRecordForm.onsubmit = (e) => { e.preventDefault(); const v = +els.fareInput.value; if(v > 0) requestAddFare(v); };
        document.getElementById('resetBtn').onclick = () => { if(confirm('⚠️ 將會清空所有紀錄，確定要開新月份嗎？')) { state.records=[]; state.config.startDate = new Date().toISOString().split('T')[0]; els.startDate.value = state.config.startDate; save(); els.configSection.classList.remove('hidden'); }};

        init();
    </script>
</body>
</html>
