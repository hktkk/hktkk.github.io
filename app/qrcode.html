<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* 預覽自適應：顯示時縮放，下載時維持原大 */
        #qrcode img, #qrcode canvas {
            margin: 0 auto;
            border: 8px solid white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 0.5rem;
            max-width: 100%; /* 適配視窗寬度 */
            height: auto !important; /* 保持比例 */
        }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #3b82f6;
            cursor: pointer;
            border-radius: 50%;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none;
            margin: 0; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">QR Code 高解析生成器</h1>
        
        <!-- 輸入區域 -->
        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">輸入網址或文字</label>
                <input type="text" id="text-input" placeholder="例如: https://google.com" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                    value="https://google.com">
            </div>

            <!-- 解析度調整 -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-medium text-gray-700">調整解析度 (100 - 1000 px)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="size-number" min="100" max="1000" value="200"
                            class="w-20 px-2 py-1 text-center border border-blue-200 rounded text-blue-600 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <span class="text-sm font-bold text-blue-600">px</span>
                    </div>
                </div>
                <input type="range" id="size-slider" min="100" max="1000" value="200" step="10"
                    class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider-thumb">
            </div>
        </div>

        <!-- 預覽區域 -->
        <div class="mt-8 flex flex-col items-center">
            <div id="qrcode-container" class="bg-gray-50 p-6 rounded-xl border border-dashed border-gray-300 w-full flex items-center justify-center min-h-[200px]">
                <div id="qrcode"></div>
            </div>
            <p class="text-xs text-gray-400 mt-3 text-center">
                預覽已自動縮放以適應螢幕<br>
                下載的文件將會是您設定的真實尺寸
            </p>
        </div>

        <!-- 下載按鈕 -->
        <div class="mt-8">
            <button id="download-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                下載圖片
            </button>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const sizeSlider = document.getElementById('size-slider');
        const sizeNumber = document.getElementById('size-number');
        const qrcodeDiv = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        let debounceTimer;

        // 生成 QR Code 的函式
        function generateQRCode() {
            const text = textInput.value.trim();
            const size = parseInt(sizeNumber.value) || 100;

            // 當尺寸較大時，使用防抖 (Debounce) 以提升效能
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                qrcodeDiv.innerHTML = "";

                if (text === "") return;

                // 建立新的 QRCode
                new QRCode(qrcodeDiv, {
                    text: text,
                    width: size,
                    height: size,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }, 150); 
        }

        // 處理輸入邏輯同步
        function handleSizeChange(e) {
            let val = parseInt(e.target.value);
            
            // 限制範圍在 100~1000
            if (val > 1000) val = 1000;
            if (val < 1) val = 1; // 容許輸入時變小，但失焦或生成會有限制

            sizeSlider.value = val;
            sizeNumber.value = val;
            
            generateQRCode();
        }

        // 下載功能
        function downloadImage() {
            const img = qrcodeDiv.querySelector('img');
            const canvas = qrcodeDiv.querySelector('canvas');
            
            if (img && img.src && img.src.startsWith('data:image')) {
                triggerDownload(img.src);
            } else if (canvas) {
                try {
                    const url = canvas.toDataURL("image/png");
                    triggerDownload(url);
                } catch (e) {
                    console.error("Canvas 轉換失敗", e);
                }
            }
        }

        function triggerDownload(dataUrl) {
            const size = sizeNumber.value;
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = `qrcode_${size}x${size}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 監聽事件
        textInput.addEventListener('input', generateQRCode);
        
        // 滑桿與數字輸入框同步
        sizeSlider.addEventListener('input', (e) => {
            sizeNumber.value = e.target.value;
            generateQRCode();
        });

        sizeNumber.addEventListener('input', handleSizeChange);
        sizeNumber.addEventListener('blur', () => {
            // 失焦時強制回填最小限制
            if (parseInt(sizeNumber.value) < 100) {
                sizeNumber.value = 100;
                sizeSlider.value = 100;
                generateQRCode();
            }
        });

        downloadBtn.addEventListener('click', downloadImage);

        // 頁面載入時初始生成
        window.onload = generateQRCode;
    </script>
</body>
</html>
