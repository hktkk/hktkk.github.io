<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港小學職位追蹤 (明報 JUMP)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { display: none; }
        .loading.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-blue-800 mb-2">香港小學職位追蹤</h1>
            <p class="text-gray-600">自動抓取明報 JUMP 教育類職位，助你鎖定常額教席。</p>
        </header>

        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <div class="flex items-center gap-4">
                    <select id="dataSource" class="border rounded px-3 py-2 bg-blue-50 border-blue-200 text-blue-800 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="recent_jobs.csv">最近 180 天 (熱數據)</option>
                        <option value="all_jobs.csv">所有歷史 (冷數據)</option>
                    </select>
                    <div id="statusInfo" class="text-sm text-gray-500">正在加載...</div>
                </div>
                <div class="flex-1 min-w-[300px]">
                    <input type="text" id="searchInput" placeholder="搜尋職位、公司名稱或日期 (YYYY-MM-DD)..." 
                           class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700 uppercase text-sm">
                            <th class="p-3 border-b">發布日期</th>
                            <th class="p-3 border-b">職位名稱</th>
                            <th class="p-3 border-b">公司名稱</th>
                            <th class="p-3 border-b text-center">詳情</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody" class="text-gray-800">
                        <!-- 數據將在此處生成 -->
                    </tbody>
                </table>
            </div>
            
            <div id="noResults" class="hidden p-8 text-center text-gray-500">
                找不到符合條件的職位。
            </div>
        </div>

        <footer class="text-center text-gray-400 text-sm">
            <p>數據每日自動更新 | Powered by Manus Agent</p>
        </div>
    </div>

    <script>
        let allData = [];
        const dataSource = document.getElementById('dataSource');
        const statusInfo = document.getElementById('statusInfo');
        const searchInput = document.getElementById('searchInput');
        const tableBody = document.getElementById('jobTableBody');
        const noResults = document.getElementById('noResults');

        async function loadData(filename) {
            statusInfo.textContent = '正在讀取數據...';
            tableBody.innerHTML = '';
            
            Papa.parse(filename, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allData = results.data;
                    renderTable(allData);
                    statusInfo.textContent = `共找到 ${allData.length} 筆職位`;
                },
                error: function(err) {
                    statusInfo.textContent = '數據加載失敗，請確保 CSV 文件已部署。';
                    console.error(err);
                }
            });
        }

        function renderTable(data) {
            tableBody.innerHTML = '';
            if (data.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            data.forEach(job => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-blue-50 border-b transition-colors';
                row.innerHTML = `
                    <td class="p-3 whitespace-nowrap font-mono text-sm">${job['發布日期'] || 'N/A'}</td>
                    <td class="p-3 font-medium text-blue-700">${job['職位名稱'] || 'N/A'}</td>
                    <td class="p-3 text-gray-600">${job['公司名稱'] || 'N/A'}</td>
                    <td class="p-3 text-center">
                        <a href="${job['職位詳情連結']}" target="_blank" class="text-blue-500 hover:underline">查看</a>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // 搜尋功能
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(job => 
                (job['職位名稱'] || '').toLowerCase().includes(term) ||
                (job['公司名稱'] || '').toLowerCase().includes(term) ||
                (job['發布日期'] || '').includes(term)
            );
            renderTable(filtered);
        });

        // 切換數據源
        dataSource.addEventListener('change', (e) => {
            loadData(e.target.value);
        });

        // 初始加載熱數據
        loadData('recent_jobs.csv');
    </script>
</body>
</html>
