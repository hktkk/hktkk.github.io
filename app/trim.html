<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <script src="coi-serviceworker.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 語音轉檔 (FFmpeg.wasm 巨獸版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- 引入 FFmpeg.wasm (v0.12 ) 核心庫 -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
    <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .drag-over { border-color: #8b5cf6 !important; background-color: #f5f3ff !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="bg-purple-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-purple-600">
                <i data-lucide="cpu" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">AI 語音轉檔器 <span class="text-purple-600 text-lg">(WASM 巨獸版 )</span></h1>
            <p class="text-slate-500 mt-2 text-sm">搭載 FFmpeg 引擎，專為 100MB+ 大型檔案設計  
<span class="font-semibold">16kHz / 單聲道 / 64kbps MP3</span></p>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:bg-slate-50 transition-colors duration-200">
            <input type="file" id="fileInput" class="hidden" accept="audio/*,video/*">
            <i data-lucide="file-audio-2" class="w-12 h-12 text-slate-400 mx-auto mb-3"></i>
            <h3 class="text-lg font-medium text-slate-700" id="fileNameDisplay">點擊選擇檔案，或拖曳至此處</h3>
            <p class="text-slate-400 text-sm mt-1">支援超大型 WAV, MP3, M4A 甚至 MP4 影片檔</p>
        </div>

        <div id="progressContainer" class="hidden mt-6">
            <div class="flex justify-between text-sm text-slate-600 mb-2">
                <span id="statusText">正在載入 FFmpeg 引擎...</span>
                <span id="progressPercentage">0%</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2.5">
                <div id="progressBar" class="bg-purple-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p id="logText" class="text-xs text-slate-400 mt-2 h-4 overflow-hidden text-ellipsis whitespace-nowrap"></p>
        </div>

        <div class="mt-8 flex justify-center gap-4">
            <button id="convertBtn" class="bg-purple-600 hover:bg-purple-700 text-white font-medium py-2.5 px-6 rounded-lg transition duration-200 flex items-center gap-2 opacity-50 cursor-not-allowed" disabled>
                <i data-lucide="zap" class="w-5 h-5"></i>
                啟動 WASM 轉檔
            </button>
        </div>

        <div id="resultContainer" class="hidden mt-8 p-6 bg-green-50 rounded-xl border border-green-100 text-center">
            <h3 class="text-green-800 font-medium flex items-center justify-center gap-2 mb-4">
                <i data-lucide="check-circle-2" class="w-5 h-5"></i> 巨型檔案轉換完成！
            </h3>
            <audio id="audioPreview" controls class="w-full mb-4"></audio>
            <a id="downloadLink" class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg transition duration-200">
                <i data-lucide="download" class="w-5 h-5"></i>
                下載最佳化 MP3
            </a>
            <p id="statsText" class="text-xs text-slate-500 mt-4"></p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 從全域變數獲取 FFmpeg 模組
        const { FFmpeg } = window.FFmpeg;
        const { fetchFile } = window.FFmpegUtil;
        const ffmpeg = new FFmpeg();

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const convertBtn = document.getElementById('convertBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressPercentage = document.getElementById('progressPercentage');
        const statusText = document.getElementById('statusText');
        const logText = document.getElementById('logText');
        const resultContainer = document.getElementById('resultContainer');
        const audioPreview = document.getElementById('audioPreview');
        const downloadLink = document.getElementById('downloadLink');
        const statsText = document.getElementById('statsText');

        let currentFile = null;
        let isFfmpegLoaded = false;

        // 監聽 FFmpeg 轉檔進度
        ffmpeg.on('progress', ({ progress, time }) => {
            const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
            progressBar.style.width = `${percent}%`;
            progressPercentage.textContent = `${percent}%`;
            statusText.textContent = '正在進行高效轉檔...';
        });

        // 監聽底層 Log (可選，讓畫面看起來很厲害)
        ffmpeg.on('log', ({ message }) => {
            logText.textContent = message;
        });

        // 載入 FFmpeg 引擎
        async function loadFFmpeg() {
            if (isFfmpegLoaded) return;
            statusText.textContent = '首次啟動：正在下載 FFmpeg 核心 (約 30MB)...';
            progressContainer.classList.remove('hidden');
            
            const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript' ),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });
            
            isFfmpegLoaded = true;
            progressContainer.classList.add('hidden');
        }

        // 輔助函數：解決跨域載入 WASM 的問題
        async function toBlobURL(url, mimeType) {
            const resp = await fetch(url);
            const blob = await resp.blob();
            return URL.createObjectURL(new Blob([blob], { type: mimeType }));
        }

        // 檔案選擇邏輯
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFileSelect(e.target.files[0]);
        });

        function handleFileSelect(file) {
            currentFile = file;
            fileNameDisplay.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            fileNameDisplay.classList.add('text-purple-600', 'font-semibold');
            convertBtn.disabled = false;
            convertBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            resultContainer.classList.add('hidden');
        }

        // 開始轉檔
        convertBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            convertBtn.disabled = true;
            convertBtn.classList.add('opacity-50', 'cursor-not-allowed');
            progressContainer.classList.remove('hidden');
            progressBar.style.width = '0%';
            progressPercentage.textContent = '0%';

            try {
                // 1. 確保引擎已載入
                await loadFFmpeg();

                statusText.textContent = '正在將檔案載入虛擬記憶體...';
                
                // 2. 將檔案寫入 FFmpeg 的虛擬檔案系統 (VFS)
                const inputName = 'input_file';
                const outputName = 'output.mp3';
                await ffmpeg.writeFile(inputName, await fetchFile(currentFile));

                // 3. 執行 FFmpeg 指令 (16kHz, 單聲道, 64kbps)
                statusText.textContent = '開始轉檔...';
                await ffmpeg.exec([
                    '-i', inputName,
                    '-ar', '16000',
                    '-ac', '1',
                    '-b:a', '64k',
                    outputName
                ]);

                // 4. 從虛擬檔案系統讀取結果
                statusText.textContent = '轉檔完成，正在匯出...';
                const data = await ffmpeg.readFile(outputName);
                
                // 5. 建立下載連結
                const mp3Blob = new Blob([data.buffer], { type: 'audio/mp3' });
                const mp3Url = URL.createObjectURL(mp3Blob);
                
                audioPreview.src = mp3Url;
                downloadLink.href = mp3Url;
                const originalName = currentFile.name.substring(0, currentFile.name.lastIndexOf('.')) || currentFile.name;
                downloadLink.download = `${originalName}_16k_mono.mp3`;

                statsText.innerHTML = `原始大小: <b>${(currentFile.size / 1024 / 1024).toFixed(2)} MB</b> &rarr; 壓縮後: <b>${(mp3Blob.size / 1024 / 1024).toFixed(2)} MB</b>`;
                
                // 清理虛擬記憶體
                await ffmpeg.deleteFile(inputName);
                await ffmpeg.deleteFile(outputName);

                progressContainer.classList.add('hidden');
                resultContainer.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert('轉檔發生錯誤！請查看 Console 了解詳情。');
            } finally {
                convertBtn.disabled = false;
                convertBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
