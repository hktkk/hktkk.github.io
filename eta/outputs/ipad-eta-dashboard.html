<!doctype html>
<html lang="zh-Hant-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4f7fb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="到站時間">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>到站時間</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #090d13;
      --panel: #111821;
      --panel-soft: rgba(255, 255, 255, .055);
      --line: #263241;
      --text: #eef5ff;
      --muted: #aab8c8;
      --dim: #7d8ea1;
      --kmb: #d71920;
      --kmb-2: #b8c0c8;
      --citybus: #f7c600;
      --citybus-2: #112f6b;
      --lr-505: #da2128;
      --lr-610: #541912;
      --lr-615: #ffdc01;
      --lr-615p: #016584;
      --amber: #ffd166;
      --red: #ff6b6b;
      --button-bg: rgba(255, 255, 255, .09);
      --button-border: rgba(255, 255, 255, .16);
      --shadow: inset 0 1px 0 rgba(255, 255, 255, .07);
    }

    body.light {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-soft: rgba(5, 18, 32, .055);
      --line: #cfd8e3;
      --text: #07111f;
      --muted: #46586d;
      --dim: #64758a;
      --button-bg: #eef3f8;
      --button-border: #c7d2df;
      --shadow: 0 1px 2px rgba(15, 23, 42, .08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: block;
    }

    body,
    button,
    .route,
    .time-pill,
    .clock,
    .weather-card b,
    .sun-row b {
      font-feature-settings: "zero" 0;
    }

    .board {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: 2.65fr 1fr;
      gap: 14px;
      padding: 10px;
      background:
        linear-gradient(135deg, rgba(215, 25, 32, .08), transparent 34%),
        radial-gradient(circle at 86% 20%, rgba(35, 163, 111, .11), transparent 24%),
        var(--bg);
    }

    body.light .board {
      background:
        linear-gradient(135deg, rgba(215, 25, 32, .055), transparent 34%),
        radial-gradient(circle at 86% 20%, rgba(35, 163, 111, .08), transparent 24%),
        var(--bg);
    }

    .eta-pane,
    .side-pane {
      min-width: 0;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eta-pane {
      display: grid;
      grid-template-rows: 66px 1.145fr 1fr;
      align-content: start;
      overflow: hidden;
    }

    .eta-pane[data-bus-view="routes"] {
      grid-template-rows: 66px minmax(0, 1fr);
    }

    .eta-pane[data-bus-view="routes"] .lrt-section {
      display: none;
    }

    .side-pane {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar,
    .section-title {
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      order: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 18px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .refresh {
      min-width: 128px;
      color: var(--muted);
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border: 1px solid var(--button-border);
      border-radius: 6px;
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
    }

    .icon-button svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .icon-button:active {
      opacity: .72;
    }

    .section {
      display: grid;
      grid-template-rows: 46px 1fr;
      min-height: 0;
    }

    .lrt-section {
      order: 1;
    }

    .bus-section {
      order: 2;
    }

    .rows {
      display: grid;
      min-height: 0;
    }

    .section-title {
      display: grid;
      grid-template-columns: 92px 1fr 268px;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .section-title strong {
      color: var(--text);
      font-size: 19px;
      letter-spacing: 0;
    }

    .title-main {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .back-button {
      width: 30px;
      height: 30px;
      display: none;
      place-items: center;
      padding: 0;
      border: 1px solid var(--button-border);
      border-radius: 6px;
      background: var(--button-bg);
      color: var(--text);
      cursor: pointer;
      line-height: 1;
    }

    .back-button svg {
      width: 17px;
      height: 17px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.4;
    }

    .bus-section[data-mode="routes"] .back-button {
      display: grid;
    }

    .eta-row {
      min-height: 66px;
      display: grid;
      grid-template-columns: 92px 1fr 268px;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .eta-row:last-child {
      border-bottom: 0;
    }

    .bus-section[data-mode="stations"] .rows {
      grid-template-rows: repeat(5, minmax(0, 1fr));
      padding-bottom: 6px;
    }

    .bus-section[data-mode="stations"] .time-head {
      display: none;
    }

    .bus-section[data-mode="stations"] .section-title,
    .bus-section[data-mode="stations"] .eta-row {
      grid-template-columns: 92px 1fr 44px;
    }

    .bus-section[data-mode="stations"] .eta-row {
      min-height: 0;
      cursor: pointer;
    }

    .bus-section[data-mode="stations"] .route {
      height: 42px;
    }

    .bus-section[data-mode="routes"] .rows {
      grid-auto-rows: 66px;
      grid-template-rows: none;
      align-content: start;
      overflow: hidden;
    }

    .bus-section[data-mode="routes"] .eta-row {
      min-height: 66px;
    }

    .station-enter {
      display: grid;
      place-items: center;
      color: var(--dim);
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 27px;
      font-weight: 700;
    }

    .station-mark {
      height: 42px;
      border: 2px solid var(--kmb-2);
      background: linear-gradient(135deg, var(--kmb), #9e1116);
      font-size: 20px;
    }

    .station-mark.citybus {
      border-color: var(--citybus-2);
      color: var(--citybus-2);
    }

    .bus-section[data-mode="stations"] .dest-main {
      font-size: 23px;
    }

    .bus-section[data-mode="stations"] .dest-sub {
      margin-top: 4px;
      font-size: 14px;
    }

    .lrt-section .rows {
      grid-template-rows: repeat(6, minmax(0, 1fr));
    }

    .lrt-section .eta-row {
      min-height: 0;
    }

    .lrt-section .route {
      height: 42px;
      font-size: 24px;
    }

    .lrt-section .dest-main {
      font-size: 22px;
    }

    .lrt-section .dest-sub {
      margin-top: 4px;
      font-size: 13px;
    }

    .lrt-section .time-head,
    .lrt-section .times {
      grid-template-columns: repeat(2, calc((100% - 16px) / 3));
      justify-content: end;
    }

    .route {
      height: 48px;
      display: grid;
      place-items: center;
      padding-bottom: 2px;
      border-radius: 6px;
      color: #fff;
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      line-height: 1;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, .22);
    }

    .bus-section .route {
      padding-bottom: 5px;
    }

    .route.kmb {
      border: 2px solid var(--kmb-2);
      background: linear-gradient(135deg, var(--kmb), #9e1116);
    }

    .route.citybus {
      color: var(--citybus-2);
      background: linear-gradient(135deg, var(--citybus), #f3a900);
    }

    .route.lr-610 {
      background: var(--lr-610);
    }

    .route.lr-505 {
      background: var(--lr-505);
    }

    .route.lr-615 {
      color: #111;
      background: var(--lr-615);
    }

    .route.lr-615p {
      background: var(--lr-615p);
    }

    .dest {
      min-width: 0;
    }

    .dest-main {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dest-sub {
      display: block;
      margin-top: 7px;
      overflow: hidden;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dest-sub:empty {
      display: none;
    }

    .times {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      min-width: 0;
    }

    .time-pill {
      width: 100%;
      max-width: 100%;
      min-width: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 8px;
      border: 1px solid var(--button-border);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--text);
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-variant-numeric: tabular-nums;
      text-align: center;
    }

    .time-pill b {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .time-pill span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
    }

    .time-pill.soon {
      border-color: rgba(255, 209, 102, .76);
      background: rgba(255, 209, 102, .15);
      color: #ffd166;
    }

    body.light .time-pill.soon {
      color: #8a5b00;
    }

    .time-pill.now {
      border-color: rgba(255, 107, 107, .78);
      background: rgba(255, 107, 107, .15);
      color: var(--red);
    }

    body.light .time-pill.now {
      color: #b3191f;
    }

    .time-pill.arrival {
      align-items: center;
      padding-right: 3px;
      padding-left: 3px;
    }

    .time-pill.arrival b {
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      overflow: hidden;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.05;
      text-overflow: clip;
      white-space: nowrap;
    }

    .time-pill.empty b {
      color: var(--dim);
      font-size: 22px;
    }

    .clock-block {
      padding: 17px 18px 14px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .06em;
    }

    .clock {
      margin-top: 8px;
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 46px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .date {
      margin-top: 12px;
      color: var(--text);
      font-size: 26px;
      font-weight: 800;
      line-height: 1.15;
    }

    .weather {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      min-height: 0;
      padding: 10px 18px 18px;
    }

    .weather-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 13px;
    }

    .weather-card {
      min-height: 76px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .weather-card span {
      display: block;
      color: var(--dim);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
    }

    .weather-card b {
      display: block;
      margin-top: 8px;
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 38px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      white-space: nowrap;
    }

    .humidity b {
      font-size: 38px;
    }

    .condition {
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--text);
      font-size: 21px;
      font-weight: 800;
      line-height: 1.25;
    }

    .condition img {
      width: 38px;
      height: 38px;
      padding: 4px;
      border-radius: 50%;
      background: rgba(100, 117, 138, .14);
      box-shadow: inset 0 0 0 1px rgba(100, 117, 138, .16);
      object-fit: contain;
    }

    .sun-times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 14px;
    }

    .sun-row {
      min-height: 44px;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: start;
      gap: 5px;
      color: var(--text);
    }

    .sun-row span {
      color: var(--dim);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: .05em;
    }

    .sun-row b {
      display: block;
      font-family: "Noto Sans HK", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 23px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-align: left;
    }

    .warnings {
      display: grid;
      align-content: start;
      gap: 8px;
      margin-top: 12px;
    }

    .warning {
      min-height: 43px;
      display: grid;
      grid-template-columns: 38px 1fr;
      align-items: center;
      gap: 10px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--amber);
      font-size: 19px;
      font-weight: 800;
      line-height: 1.15;
    }

    .warning.red {
      color: var(--red);
    }

    .warning.none {
      min-height: 34px;
      grid-template-columns: 1fr;
      color: var(--muted);
      font-size: 17px;
    }

    body.light .warning {
      color: #745000;
    }

    body.light .warning.red {
      color: #a4141a;
    }

    .warning img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .time-head {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      text-align: center;
    }

    @media (max-height: 755px) {
      .board {
        padding: 8px 10px;
      }

      .eta-pane {
        grid-template-rows: 64px 1.145fr 1fr;
      }

      .eta-pane[data-bus-view="routes"] {
        grid-template-rows: 64px minmax(0, 1fr);
      }

      .eta-row {
        min-height: 64px;
      }

    }

  </style>
</head>

          </article>
          <article class="eta-row" data-provider="lrt">

            <div class="times" data-times>

              <div class="time-pill empty"><b>--</b></div>
              <div class="time-pill empty"><b>--</b></div>
            </div>
          </article>
          <article class="eta-row" data-provider="lrt">
            <div class="route lr-610">610</div>
            <div class="dest">
              <span class="dest-main">石排站</span>
              <span class="dest-sub">輕鐵 · 等候資料</span>
            </div>
            <div class="times" data-times>
              <div class="time-pill empty"><b>--</b></div>
              <div class="time-pill empty"><b>--</b></div>
            </div>
          </article>
        </div>
      </section>

    </section>

    <aside class="side-pane" aria-label="時間及天氣">
      <section class="clock-block">
        <div class="kicker">現在</div>
        <div class="clock" id="clock">21:39:08</div>
        <p class="date" id="date">7月4日 星期六</p>
        <div class="sun-times" aria-label="日出日落">
          <div class="sun-row"><span>日出</span><b>05:44</b></div>
          <div class="sun-row"><span>日落</span><b>19:12</b></div>
        </div>
      </section>

      <section class="weather">
        <div class="kicker">屯門天氣</div>
        <div class="weather-pair">
          <div class="weather-card">
            <span>溫度</span>
            <b id="temperatureValue">--.-°C</b>
          </div>
          <div class="weather-card humidity">
            <span>濕度</span>
            <b id="humidityValue">--%</b>
          </div>
        </div>
        <div class="condition" aria-label="天氣概況">
          <img id="weatherIcon" src="https://www.hko.gov.hk/images/HKOWxIconOutline/pic63.png" alt="">
          <span id="conditionText">讀取天氣資料</span>
        </div>
        <div>
          <div class="warnings" id="warnings" aria-label="天氣警告">
            <div class="warning none"><span>讀取天氣警告</span></div>
          </div>
        </div>
      </section>
    </aside>
  </main>

  <script>
    const ETA_REFRESH_SECONDS = 15;
    const WEATHER_REFRESH_SECONDS = 300;
    const LRT_STATION_ID = 170;
    const KMB_STOP_ETA_BASE = "https://data.etabus.gov.hk/v1/transport/kmb/stop-eta";
    const CTB_ETA_BASE = "https://rt.data.gov.hk/v2/transport/citybus/eta/CTB";
    const LRT_ETA_URL = `https://rt.data.gov.hk/v1/transport/mtr/lrt/getSchedule?station_id=${LRT_STATION_ID}&with_special=1`;
    const HKO_CURRENT_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";
    const HKO_FORECAST_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc";
    const HKO_WARNINGS_URL = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc";
    const TUEN_MUN_WEATHER_URL = "https://helio.dedyn.io/eta-weather/tuen-mun";
    const HKO_ICON_BASE = "https://www.hko.gov.hk/en/wxinfo/dailywx/images/";
    const HKO_WEATHER_ICON_BASE = "https://www.hko.gov.hk/images/HKOWxIconOutline/";
    const hkoWarningIcons = {
      WTS: "ts.gif",
      WRAINA: "raina.gif",
      WRAINR: "rainr.gif",
      WRAINB: "rainb.gif",
      TC1: "tc1.gif",
      TC3: "tc3.gif",
      TC8NE: "tc8ne.gif",
      TC8SE: "tc8se.gif",
      TC8SW: "tc8sw.gif",
      TC8NW: "tc8nw.gif",
      TC9: "tc9.gif",
      TC10: "tc10.gif",
      WHOT: "vhot.gif",
      WCOLD: "cold.gif"
    };
    const busStations = [
      { id: "clp", name: "中電", provider: "kmb", stopId: "1AD9C759A42F9003" },
      { id: "tai-hing", name: "大興街", provider: "kmb", stopId: "6AE148CA74FC4D53" },
      { id: "shek-pai", name: "石排站", provider: "kmb", stopId: "19B569A51034271F" },
      { id: "shan-king", name: "山景總站", provider: "kmb", stopId: "640B42B50FB0152E" },
      { id: "king-lai", name: "山景邨景麗樓", provider: "ctb", stopId: "003201", routes: ["B3A"] }
    ];
    const busProviderLabels = {
      kmb: "九巴",
      ctb: "城巴"
    };
    const lrtRouteClasses = {
      "505": "lr-505",
      "610": "lr-610",
      "615": "lr-615",
      "615P": "lr-615p"
    };
    const zhWeekdays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
    const two = value => String(value).padStart(2, "0");
    const refresh = document.getElementById("refresh");
    const body = document.body;
    const themeColorMeta = document.querySelector('meta[name="theme-color"]');
    const statusBarMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
    const themeToggle = document.getElementById("themeToggle");
    const etaPane = document.getElementById("etaPane");
    const busSection = document.getElementById("busSection");
    const busRows = document.getElementById("busRows");
    const busSubtitle = document.getElementById("busSubtitle");
    const busBack = document.getElementById("busBack");
    const lrtRows = Array.from(document.querySelectorAll('[data-provider="lrt"]'));
    const temperatureValue = document.getElementById("temperatureValue");
    const humidityValue = document.getElementById("humidityValue");
    const weatherIcon = document.getElementById("weatherIcon");
    const conditionText = document.getElementById("conditionText");
    const warnings = document.getElementById("warnings");
    let selectedBusStation = null;

    function formatClock(date) {
      return `${two(date.getHours())}:${two(date.getMinutes())}:${two(date.getSeconds())}`;
    }

    function formatDate(date) {
      return `${date.getMonth() + 1}月${date.getDate()}日 ${zhWeekdays[date.getDay()]}`;
    }

    function setRefreshLabel(date) {
      refresh.textContent = `更新時間 ${formatClock(date)}`;
    }

    function formatTemperature(value) {
      return `${Number(value).toFixed(1)}°C`;
    }

    function firstSentence(text) {
      if (!text) return "未有天氣概況";
      const index = text.indexOf("。");
      return index === -1 ? text : text.slice(0, index + 1);
    }

    function etaFromIso(isoString) {
      if (!isoString) return null;
      const minutes = Math.ceil((new Date(isoString).getTime() - Date.now()) / 60000);
      if (!Number.isFinite(minutes)) return null;
      if (minutes <= 1) return { arrival: true, sort: 0 };
      return { minutes, sort: minutes };
    }

    function etaFromLrtText(text) {
      if (!text || text === "-" || /即將|到達|抵達/.test(text)) {
        return { arrival: true, sort: 0 };
      }
      const match = text.match(/\d+/);
      if (!match) return null;
      const minutes = Number(match[0]);
      return minutes <= 1 ? { arrival: true, sort: 0 } : { minutes, sort: minutes };
    }

    function createTimePill(eta) {
      const pill = document.createElement("div");
      const value = document.createElement("b");
      pill.className = "time-pill";

      if (!eta) {
        pill.classList.add("empty");
        value.textContent = "--";
        pill.append(value);
        return pill;
      }

      if (eta.arrival) {
        pill.classList.add("now", "arrival");
        value.textContent = "即將到達";
        pill.append(value);
        return pill;
      }

      if (eta.minutes <= 4) pill.classList.add("soon");
      value.textContent = eta.minutes;
      const unit = document.createElement("span");
      unit.textContent = "分";
      pill.append(value, unit);
      return pill;
    }

    function renderTimes(container, etas, count = 3) {
      const slots = Array.from({ length: count }, (_, index) => createTimePill(etas[index]));
      container.replaceChildren(...slots);
    }

    function createRouteBadge(text, className = "kmb") {
      const badge = document.createElement("div");
      badge.className = `route ${className}`;
      badge.textContent = text;
      return badge;
    }

    function busProviderLabel(station) {
      return busProviderLabels[station?.provider] || "巴士";
    }

    function busRouteClass(station) {
      return station?.provider === "ctb" ? "citybus" : "kmb";
    }

    function busStationBadgeClass(station) {
      return station?.provider === "ctb" ? "station-mark citybus" : "station-mark";
    }

    function createDestination(mainText, subText) {
      const dest = document.createElement("div");
      const main = document.createElement("span");
      const sub = document.createElement("span");
      dest.className = "dest";
      main.className = "dest-main";
      sub.className = "dest-sub";
      main.textContent = mainText;
      sub.textContent = subText;
      dest.append(main, sub);
      return dest;
    }

    function createBusStationRow(station) {
      const row = document.createElement("article");
      const enter = document.createElement("div");
      row.className = "eta-row station-row";
      row.tabIndex = 0;
      row.setAttribute("role", "button");
      row.setAttribute("aria-label", `${station.name} 巴士路線`);
      row.append(
        createRouteBadge(busProviderLabel(station), busStationBadgeClass(station)),
        createDestination(station.name, ""),
        enter
      );
      enter.className = "station-enter";
      enter.textContent = "›";
      row.addEventListener("click", () => selectBusStation(station.id));
      row.addEventListener("keydown", event => {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        selectBusStation(station.id);
      });
      return row;
    }

    function renderBusStations() {
      etaPane.dataset.busView = "stations";
      busSection.dataset.mode = "stations";
      busSubtitle.textContent = "車站";
      selectedBusStation = null;
      busRows.replaceChildren(...busStations.map(createBusStationRow));
    }

    function groupBusEtas(items) {
      const groups = new Map();
      for (const item of items || []) {
        const key = `${item.route}|${item.dest_tc}`;
        if (!groups.has(key)) {
          groups.set(key, {
            route: item.route,
            dest: item.dest_tc,
            etas: []
          });
        }
        const eta = etaFromIso(item.eta);
        if (eta) groups.get(key).etas.push(eta);
      }
      return Array.from(groups.values())
        .map(group => ({
          ...group,
          etas: group.etas.sort((a, b) => a.sort - b.sort),
          nextSort: group.etas[0]?.sort ?? Number.POSITIVE_INFINITY
        }))
        .sort((a, b) => a.nextSort - b.nextSort || a.route.localeCompare(b.route, "zh-Hant-HK", { numeric: true }));
    }

    function createBusRouteRow(station, group) {
      const row = document.createElement("article");
      const times = document.createElement("div");
      row.className = "eta-row";
      times.className = "times";
      row.append(
        createRouteBadge(group.route, busRouteClass(station)),
        createDestination(`往${group.dest}`, `${station.name} · ${busProviderLabel(station)}`),
        times
      );
      renderTimes(times, group.etas);
      return row;
    }

    function renderBusMessage(text) {
      const row = document.createElement("article");
      row.className = "eta-row";
      row.append(createRouteBadge("--", busStationBadgeClass(selectedBusStation)), createDestination(text, busProviderLabel(selectedBusStation)), document.createElement("div"));
      busRows.replaceChildren(row);
    }

    function selectBusStation(stationId) {
      selectedBusStation = busStations.find(station => station.id === stationId) || null;
      if (!selectedBusStation) return renderBusStations();
      etaPane.dataset.busView = "routes";
      busSection.dataset.mode = "routes";
      busSubtitle.textContent = selectedBusStation.name;
      renderBusMessage("讀取路線");
      updateBusEtas();
    }

    async function fetchKmbStationGroups(station) {
      const response = await fetch(`${KMB_STOP_ETA_BASE}/${station.stopId}`, { cache: "no-store" });
      const payload = await response.json();
      return groupBusEtas(payload.data);
    }

    async function fetchCtbStationGroups(station) {
      const routeData = await Promise.all((station.routes || []).map(async route => {
        const response = await fetch(`${CTB_ETA_BASE}/${station.stopId}/${encodeURIComponent(route)}`, { cache: "no-store" });
        const payload = await response.json();
        return payload.data || [];
      }));
      return groupBusEtas(routeData.flat());
    }

    async function updateBusEtas() {
      if (!selectedBusStation) return renderBusStations();
      try {
        const groups = selectedBusStation.provider === "ctb"
          ? await fetchCtbStationGroups(selectedBusStation)
          : await fetchKmbStationGroups(selectedBusStation);
        if (!groups.length) return renderBusMessage("暫無巴士資料");
        busRows.replaceChildren(...groups.map(group => createBusRouteRow(selectedBusStation, group)));
      } catch (error) {
        console.warn(`未能更新${busProviderLabel(selectedBusStation)} ${selectedBusStation.name} ETA`, error);
        renderBusMessage("暫無巴士資料");
      }
    }

    function setLrtRow(row, group) {
      const routeBadge = row.querySelector(".route");
      const main = row.querySelector(".dest-main");
      const sub = row.querySelector(".dest-sub");

      if (!group) {
        routeBadge.className = "route lr-610";
        routeBadge.textContent = "--";
        main.textContent = "石排站";
        sub.textContent = "輕鐵 · 暫無資料";
        renderTimes(row.querySelector("[data-times]"), [], 2);
        return;
      }

      routeBadge.className = `route ${lrtRouteClasses[group.routeNo] || "lr-610"}`;
      routeBadge.textContent = group.routeNo;
      main.textContent = `往${group.dest}`;
      sub.textContent = `石排站 · ${group.platform} 號月台`;
      renderTimes(row.querySelector("[data-times]"), group.etas, 2);
    }

    async function updateLrtEtas() {
      try {
        const response = await fetch(LRT_ETA_URL, { cache: "no-store" });
        const payload = await response.json();
        const groups = new Map();

        for (const platform of payload.platform_list || []) {
          for (const train of platform.route_list || []) {
            if (train.arrival_departure && train.arrival_departure !== "A") continue;
            const eta = etaFromLrtText(train.time_ch);
            if (!eta) continue;
            const key = `${train.route_no}|${train.dest_ch}|${platform.platform_id}`;
            if (!groups.has(key)) {
              groups.set(key, {
                routeNo: train.route_no,
                dest: train.dest_ch,
                platform: platform.platform_id,
                etas: []
              });
            }
            groups.get(key).etas.push(eta);
          }
        }

        const ordered = Array.from(groups.values())
          .map(group => ({ ...group, etas: group.etas.sort((a, b) => a.sort - b.sort) }))
          .sort((a, b) => a.etas[0].sort - b.etas[0].sort);
        lrtRows.forEach((row, index) => setLrtRow(row, ordered[index]));
      } catch (error) {
        console.warn("未能更新輕鐵 ETA", error);
        lrtRows.forEach(row => setLrtRow(row, null));
      }
    }

    function renderWarnings(items) {
      const active = Object.values(items || {});
      if (!active.length) {
        const empty = document.createElement("div");
        empty.className = "warning none";
        empty.append(document.createElement("span"));
        empty.firstElementChild.textContent = "未有天氣警告";
        warnings.replaceChildren(empty);
        return;
      }

      warnings.replaceChildren(...active.map(item => {
        const row = document.createElement("div");
        const code = item.code || "";
        row.className = /WTS|WRAINR|WRAINB|TC8|TC9|TC10/.test(code) ? "warning red" : "warning";

        const icon = hkoWarningIcons[code];
        if (icon) {
          const img = document.createElement("img");
          img.src = `${HKO_ICON_BASE}${icon}`;
          img.alt = "";
          row.append(img);
        }

        const label = document.createElement("span");
        label.textContent = item.name || code || "天氣警告";
        row.append(label);
        return row;
      }));
    }

    async function fetchTuenMunWeather() {
      try {
        const response = await fetch(TUEN_MUN_WEATHER_URL, { cache: "no-store" });
        if (!response.ok) return null;
        return response.json();
      } catch (error) {
        console.warn("未能更新屯門天氣代理", error);
        return null;
      }
    }

    async function updateWeather() {
      try {
        const [tuenMunWeather, currentResponse, forecastResponse, warningsResponse] = await Promise.all([
          fetchTuenMunWeather(),
          fetch(HKO_CURRENT_URL, { cache: "no-store" }),
          fetch(HKO_FORECAST_URL, { cache: "no-store" }),
          fetch(HKO_WARNINGS_URL, { cache: "no-store" })
        ]);
        const [current, forecast, warningSummary] = await Promise.all([
          currentResponse.json(),
          forecastResponse.json(),
          warningsResponse.json()
        ]);
        const temperature = current.temperature?.data?.find(item => item.place === "屯門")
          || current.temperature?.data?.[0];
        const humidity = current.humidity?.data?.find(item => item.place === "香港天文台")
          || current.humidity?.data?.[0];

        if (tuenMunWeather?.temperature !== undefined) {
          temperatureValue.textContent = formatTemperature(tuenMunWeather.temperature);
        } else if (temperature) {
          temperatureValue.textContent = formatTemperature(temperature.value);
        }
        if (tuenMunWeather?.humidity !== undefined) {
          humidityValue.textContent = `${tuenMunWeather.humidity}%`;
        } else if (humidity) {
          humidityValue.textContent = `${humidity.value}%`;
        }
        if (current.icon?.[0]) weatherIcon.src = `${HKO_WEATHER_ICON_BASE}pic${current.icon[0]}.png`;
        conditionText.textContent = firstSentence(forecast.forecastDesc);
        renderWarnings(warningSummary);
      } catch (error) {
        console.warn("未能更新屯門天氣", error);
      }
    }

    async function updateEta() {
      await Promise.allSettled([updateBusEtas(), updateLrtEtas()]);
      setRefreshLabel(new Date());
    }

    async function updateAll() {
      await Promise.allSettled([updateBusEtas(), updateLrtEtas(), updateWeather()]);
      setRefreshLabel(new Date());
    }

    function tick() {
      const now = new Date();
      document.getElementById("clock").textContent = formatClock(now);
      document.getElementById("date").textContent = formatDate(now);
    }

    function markManualRefresh() {
      updateAll();
    }

    function syncSystemChrome() {
      const isLight = body.classList.contains("light");
      themeColorMeta.content = isLight ? "#f4f7fb" : "#090d13";
      statusBarMeta.content = isLight ? "default" : "black";
      themeToggle.setAttribute("aria-label", isLight ? "切換暗黑模式" : "切換淺色模式");
      themeToggle.title = isLight ? "切換暗黑模式" : "切換淺色模式";
    }

    document.getElementById("manualRefresh").addEventListener("click", markManualRefresh);
    busBack.addEventListener("click", renderBusStations);
    themeToggle.addEventListener("click", () => {
      body.classList.toggle("light");
      syncSystemChrome();
    });

    console.assert(formatClock(new Date("2026-07-04T09:08:07+08:00")) === "09:08:07");
    console.assert(formatDate(new Date("2026-07-04T09:08:07+08:00")) === "7月4日 星期六");
    console.assert(formatTemperature(27) === "27.0°C");
    console.assert(formatTemperature(29.1) === "29.1°C");
    console.assert(firstSentence("大致多雲。有雨。") === "大致多雲。");
    console.assert(ETA_REFRESH_SECONDS === 15);
    console.assert(WEATHER_REFRESH_SECONDS === 300);
    console.assert(LRT_STATION_ID === 170);
    console.assert(busStations.length === 5);
    console.assert(lrtRows.length === 6);
    syncSystemChrome();
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
    tick();
    updateAll();
    setInterval(tick, 1000);
    setInterval(updateEta, ETA_REFRESH_SECONDS * 1000);
    setInterval(updateWeather, WEATHER_REFRESH_SECONDS * 1000);
  </script>
</body>
</html>
